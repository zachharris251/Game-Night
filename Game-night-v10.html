          (discardTop ? '<button class="btn" data-act="sky-draw-discard">Take discard (' + discardTop.value + ')</button>' : '') +
        '</div>';
    } else {
      // holding a card
      var canFlip = STATE.drawnFrom === 'stock';
      prompt = '<div class="prompt">Holding a ' + STATE.drawnCard.value + '. Tap one of your slots to swap it in' +
        (canFlip ? ', or discard it and flip a face-down slot.' : '.') + '</div>' +
        (canFlip ? '<div class="note">Tap a face-up slot to swap. Tap a face-down slot to swap into it. Use Discard then tap a face-down slot to flip instead.</div>' +
          '<button class="btn" data-act="sky-discard-mode"' + (skyDiscardMode ? ' disabled' : '') + '>' + (skyDiscardMode ? 'Discard mode on: tap a face-down slot' : 'Discard and flip instead') + '</button>' : '');
    }

    var myTally = (STATE.phase === 'playing')
      ? ' &middot; ' + skyLiveRound(mySeat) + ' this round &middot; ' + STATE.scores[mySeat] + ' total'
      : '';
    var mine =
      '<div class="sky-mine-wrap"><div class="eyebrow">Your grid' + (myTurn ? '' : ' (waiting)') + myTally + '</div>' +
        skyjoGrid(mySeat, { isMine: true, interactive: holding }) + '</div>';

    var overlay = '';
    if (STATE.phase === 'roundEnd' && STATE.winner != null) {
      var again = (MODE === 'localGame') ? '<button class="btn-accent btn" data-act="play-again">Next match</button>' : '<button class="btn-accent btn" data-act="home">Back to start</button>';
      var rows = '';
      for (var s = 0; s < numSeats(); s++) {
        rows += '<div class="result-row"><div class="who' + (s === mySeat ? ' us' : '') + '">' + esc(seatNameFor(s)) + '</div><span class="delta">' + STATE.scores[s] + '</span></div>';
      }
      overlay = '<div class="overlay"><div class="sheet"><div class="eyebrow">Match over</div>' +
        '<h2>' + (STATE.winner === mySeat ? '<span class="gg-win">You win!</span>' : esc(seatNameFor(STATE.winner)) + ' wins') + '</h2>' +
        rows + '<div class="actions"><button class="btn btn-ghost" data-act="home">Home</button>' + again + '</div></div></div>';
    }

    app.innerHTML = quitHeader(MODE === 'onlineGame' ? 'Room ' + esc(roomCode || '') + ' &middot; Skyjo' : 'Skyjo') +
      top + '<div class="center-note">' + center + '</div>' +
      '<div class="controls">' + prompt + '</div>' + mine + genericLog(STATE) + overlay;
    afterDispatchScroll();
  }

  // ============================================================= SKIP-BO ===
  function sbCardFace(card, opts) {
    opts = opts || {};
    if (!card) return '<span class="sb-card empty">-</span>';
    var label = card.wild ? 'SB' : String(card.value);
    var cls = 'sb-card' + (card.wild ? ' wild' : '') + (opts.mini ? ' mini' : '') +
      (opts.selectable ? ' selectable' : '') + (opts.selected ? ' selected' : '') + (opts.target ? ' target' : '');
    var attrs = opts.act ? ' data-act="' + opts.act + '"' : '';
    if (opts.data) Object.keys(opts.data).forEach(function (k) { attrs += ' data-' + k + '="' + opts.data[k] + '"'; });
    var tag = opts.act ? 'button' : 'span';
    return '<' + tag + ' class="' + cls + '"' + attrs + '>' + label + '</' + tag + '>';
  }
  function renderSkipBoTable() {
    var G = window.GAMES.skipbo;
    function meta(seat) {
      var st = STATE.stock[seat].length;
      return '<div class="meta-line"><span>stock ' + st + '</span><span class="trk">hand ' + STATE.hands[seat].length + '</span></div>';
    }
    function chip(seat) { return personChip(seat, STATE.turnSeat === seat, meta(seat)); }

    var myTurn = STATE.phase === 'playing' && STATE.turnSeat === mySeat && !awaiting;

    // validate a stale selection: the selected card must still be the top of its source
    if (sbSel && myTurn) {
      var ok = false;
      if (sbSel.source === 'stock') {
        var stTop = STATE.stock[mySeat][STATE.stock[mySeat].length - 1];
        ok = stTop && stTop.id === sbSel.cardId;
      } else if (sbSel.source === 'hand') {
        ok = STATE.hands[mySeat].some(function (c) { return c.id === sbSel.cardId; });
      } else if (sbSel.source === 'discard') {
        var dp = STATE.discardPiles[mySeat][sbSel.discardPileIndex];
        var dTop = dp[dp.length - 1];
        ok = dTop && dTop.id === sbSel.cardId;
      }
      if (!ok) sbSel = null;
    }
    if (!myTurn) sbSel = null;

    // build piles (shared) with the value each one needs next
    var builds = '';
    for (var b = 0; b < 4; b++) {
      var pile = STATE.buildPiles[b];
      var topV = pile.length ? pile[pile.length - 1].value : 0;
      var needs = topV >= 12 ? '-' : (topV + 1);
      var selCard = sbSel ? sbSelectedCard() : null;
      var isTarget = false;
      if (selCard) isTarget = G.legalTargets(STATE, selCard).indexOf(b) >= 0;
      var attrs = (myTurn && isTarget) ? ' data-act="sb-target-pile" data-pile="' + b + '"' : '';
      builds += '<button class="sb-build' + (isTarget ? ' target' : '') + '"' + attrs + (isTarget ? '' : ' tabindex="-1"') + '>' +
        '<span class="sb-build-top">' + (pile.length ? pile[pile.length - 1].value : '&middot;') + '</span>' +
        '<span class="sb-build-needs">needs ' + needs + '</span></button>';
    }

    // my stock top
    var myStockTop = STATE.stock[mySeat][STATE.stock[mySeat].length - 1];
    var stockSelectable = myTurn && !!myStockTop;
    var stockSelected = sbSel && sbSel.source === 'stock';
    var stockFace = sbCardFace(myStockTop, {
      selectable: stockSelectable, selected: stockSelected,
      act: stockSelectable ? 'sb-pick-source' : null,
      data: stockSelectable ? { source: 'stock', card: myStockTop.id } : null
    });
    var stockBlock = '<div class="sb-stock"><div class="eyebrow">Your stock (' + STATE.stock[mySeat].length + ')</div>' + stockFace + '</div>';

    // my four discard piles
    var discs = '';
    for (var d = 0; d < 4; d++) {
      var dpile = STATE.discardPiles[mySeat][d];
      var dTop2 = dpile.length ? dpile[dpile.length - 1] : null;
      // a discard-pile top can be selected as a source; an empty or any pile can be a discard target when discarding
      var selectableD = myTurn && dTop2 && !sbDiscardChoosing;
      var selectedD = sbSel && sbSel.source === 'discard' && sbSel.discardPileIndex === d;
      var discardTargetable = myTurn && sbDiscardChoosing;
      var actD = discardTargetable ? 'sb-discard-target' : (selectableD ? 'sb-pick-source' : null);
      var dataD = discardTargetable ? { pile: d } : (selectableD ? { source: 'discard', card: dTop2.id, dpi: d } : null);
      var cls = 'sb-discard-pile' + (selectedD ? ' selected' : '') + (discardTargetable ? ' target' : '');
      var attrsD2 = actD ? ' data-act="' + actD + '"' : '';
      if (dataD) Object.keys(dataD).forEach(function (k) { attrsD2 += ' data-' + k + '="' + dataD[k] + '"'; });
      discs += '<button class="' + cls + '"' + attrsD2 + ((selectableD || discardTargetable) ? '' : ' tabindex="-1"') + '>' +
        '<span class="sb-dp-label">' + (d + 1) + '</span>' +
        (dTop2 ? '<span class="sb-dp-top">' + (dTop2.wild ? 'SB' : dTop2.value) + '</span><span class="sb-dp-count">' + dpile.length + '</span>' : '<span class="sb-dp-empty">empty</span>') +
        '</button>';
    }
    var discardsBlock = '<div class="sb-discards"><div class="eyebrow">Your discard piles</div><div class="sb-discs-row">' + discs + '</div></div>';

    // my hand
    var handCards = STATE.hands[mySeat].map(function (c) {
      var selectable = myTurn && !sbDiscardChoosing;
      var selected = sbSel && sbSel.source === 'hand' && sbSel.cardId === c.id;
      return sbCardFace(c, {
        selectable: selectable, selected: selected,
        act: selectable ? 'sb-pick-source' : null,
        data: selectable ? { source: 'hand', card: c.id } : null
      });
    }).join('');
    var handBlock = '<div class="handbar"><div class="eyebrow">Your hand (' + STATE.hands[mySeat].length + ')</div><div class="hand sb-hand">' + (handCards || '<span class="muted">empty</span>') + '</div></div>';

    // prompt / controls
    var prompt;
    if (!myTurn) {
      prompt = (STATE.phase === 'playing') ? '<div class="muted">Waiting on ' + esc(seatNameFor(STATE.turnSeat)) + '&hellip;</div>' : '';
    } else if (sbDiscardChoosing) {
      prompt = '<div class="prompt">Tap one of your discard piles to drop the card and end your turn.</div>' +
        '<button class="btn btn-ghost btn-sm" data-act="sb-cancel-discard">Cancel</button>';
    } else if (sbSel) {
      var sc = sbSelectedCard();
      var legalT = sc ? G.legalTargets(STATE, sc) : [];
      // a selected hand card can either go onto a build pile or be discarded to end the turn
      var discardBtn = (sbSel.source === 'hand')
        ? '<button class="btn" data-act="sb-start-discard">Discard this and end turn</button>' : '';
      prompt = '<div class="prompt">Selected ' + (sc.wild ? 'a Skip-Bo' : sc.value) + ' from ' + sbSel.source + '. ' +
        (legalT.length ? 'Tap a highlighted build pile' + (discardBtn ? ', or discard it.' : '.') : (discardBtn ? 'No build pile accepts it; you can discard it.' : 'No build pile accepts this card.')) + '</div>' +
        '<div class="row" style="margin-top:8px">' + discardBtn +
        '<button class="btn btn-ghost btn-sm" data-act="sb-cancel-source">Clear selection</button></div>';
    } else {
      // check whether the player is stuck (deck exhausted, empty hand, no play)
      var stuck = STATE.hands[mySeat].length === 0 && !STATE.drawPile.length && !STATE.usedPile.length && !sbHasAnyPlay();
      prompt = '<div class="prompt">Tap a card (stock, hand, or a discard-pile top) to play it onto a build pile. To end your turn, tap a hand card then Discard.</div>' +
        (stuck ? '<div class="row" style="margin-top:8px"><button class="btn btn-accent" data-act="sb-skip">Pass (no moves)</button></div>' : '');
    }

    var others = simpleFelt(chip, '<div class="sb-builds"><div class="eyebrow">Build piles</div><div class="sb-builds-row">' + builds + '</div></div><div class="eyebrow" style="margin-top:6px">Draw: ' + STATE.drawPile.length + '</div>');

    var overlay = '';
    if (STATE.phase === 'finished') {
      var again = (MODE === 'localGame') ? '<button class="btn-accent btn" data-act="play-again">Next match</button>' : '<button class="btn-accent btn" data-act="home">Back to start</button>';
      var rows = '';
      for (var s = 0; s < numSeats(); s++) {
        rows += '<div class="result-row"><div class="who' + (s === mySeat ? ' us' : '') + '">' + esc(seatNameFor(s)) + '</div><span class="delta">stock ' + STATE.stock[s].length + '</span></div>';
      }
      overlay = '<div class="overlay"><div class="sheet"><div class="eyebrow">Game over</div>' +
        '<h2>' + (STATE.winner === mySeat ? '<span class="gg-win">You win!</span>' : esc(seatNameFor(STATE.winner)) + ' wins') + '</h2>' +
        rows + '<div class="actions"><button class="btn btn-ghost" data-act="home">Home</button>' + again + '</div></div></div>';
    }

    app.innerHTML = quitHeader(MODE === 'onlineGame' ? 'Room ' + esc(roomCode || '') + ' &middot; Skip-Bo' : 'Skip-Bo') +
      others + '<div class="controls">' + prompt + '</div>' +
      stockBlock + discardsBlock + handBlock + genericLog(STATE) + overlay;
    afterDispatchScroll();
  }
  function sbSelectedCard() {
    if (!sbSel) return null;
    if (sbSel.source === 'stock') return STATE.stock[mySeat][STATE.stock[mySeat].length - 1];
    if (sbSel.source === 'hand') return STATE.hands[mySeat].filter(function (c) { return c.id === sbSel.cardId; })[0];
    if (sbSel.source === 'discard') {
      var dp = STATE.discardPiles[mySeat][sbSel.discardPileIndex];
      return dp[dp.length - 1];
    }
    return null;
  }
  function sbHasAnyPlay() {
    var G = window.GAMES.skipbo;
    var srcs = G.playableSources(STATE, mySeat);
    for (var i = 0; i < srcs.length; i++) {
      if (G.legalTargets(STATE, srcs[i].card).length) return true;
    }
    return false;
  }

  // ============================================================ FIVE CROWNS ===
  function fcSuitSym(suit) { return suit === 'T' ? '\u2605' : suit === 'H' ? '\u2665' : suit === 'D' ? '\u2666' : suit === 'C' ? '\u2663' : suit === 'S' ? '\u2660' : '?'; }
  function fcSuitClass(card) {
    if (card.joker) return 'joker';
    return (card.suit === 'H' || card.suit === 'D') ? 'red' : (card.suit === 'T' ? 'star' : 'dark');
  }
  function fcCardById(id) { return (STATE.hands[mySeat] || []).filter(function (c) { return c.id === id; })[0]; }
  function fcCardFace(card, opts) {
    opts = opts || {};
    var G = eng();
    var wild = G.isWild(card, STATE.wildRank);
    var label = card.joker ? '\u2605' : G.rankLabel(card.rank);
    var sym = card.joker ? 'WILD' : fcSuitSym(card.suit);
    var cls = 'fc-card ' + fcSuitClass(card) + (wild ? ' wild' : '') + (opts.selected ? ' sel' : '') + (opts.small ? ' sm' : '') + (opts.tappable ? ' tappable' : '');
    var tag = opts.tappable ? 'button' : 'span';
    var attrs = opts.tappable ? (' data-act="fc-tap" data-card="' + card.id + '"') : '';
    return '<' + tag + ' class="' + cls + '"' + attrs + '>' +
      '<span class="fc-rank">' + label + '</span>' +
      '<span class="fc-suit">' + sym + '</span>' +
      '</' + tag + '>';
  }
  // cards in my hand not yet staged into a meld
  function fcMeldedIds() { var s = {}; fcMelds.forEach(function (g) { g.forEach(function (id) { s[id] = true; }); }); return s; }
  function fcAvailableCards() {
    var melded = fcMeldedIds();
    return (STATE.hands[mySeat] || []).filter(function (c) { return !melded[c.id]; });
  }
  // drop stale staging if it references cards no longer in hand
  function fcSyncStaging() {
    var have = {}; (STATE.hands[mySeat] || []).forEach(function (c) { have[c.id] = true; });
    var stale = false;
    fcMelds.forEach(function (g) { g.forEach(function (id) { if (!have[id]) stale = true; }); });
    fcSel.forEach(function (id) { if (!have[id]) stale = true; });
    if (stale) { fcMelds = []; fcSel = []; }
  }

  function renderFiveCrownsTable() {
    var G = eng();
    var myTurn = STATE.phase === 'playing' && STATE.turnSeat === mySeat && !awaiting;
    var acting = myTurn && STATE.turnPhase === 'act';
    // clear staging whenever it is not my moment to lay down
    if (!acting) { fcSel = []; fcMelds = []; } else { fcSyncStaging(); }

    function scoreMeta(seat) {
      var out = (STATE.goneOut === seat) ? ' <span class="chip out">out</span>' : '';
      var n = (STATE.hands[seat] || []).length;
      return '<div class="meta-line"><span>' + (STATE.scores[seat] || 0) + ' pts</span><span class="fc-count">' + n + ' cards</span>' + out + '</div>';
    }
    function seatChip(seat) { return personChip(seat, STATE.turnSeat === seat && STATE.phase === 'playing', scoreMeta(seat)); }

    var top = '<div class="opp-row">' + otherSeats().map(seatChip).join('') + '</div>';

    var discardTop = STATE.discard[STATE.discard.length - 1];
    var wildLabel = G.rankLabel(STATE.wildRank);
    var banner = '<div class="fc-banner"><span class="fc-round">Round ' + STATE.round + '/11</span>' +
      '<span class="fc-wild">Wild: ' + wildLabel + '\u2019s + jokers</span></div>';

    var center =
      '<div class="fc-center">' +
        '<div class="fc-pile"><div class="eyebrow">Draw</div><div class="fc-pileface down">' + STATE.stock.length + '</div></div>' +
        '<div class="fc-pile"><div class="eyebrow">Discard</div>' +
          (discardTop ? fcCardFace(discardTop, {}) : '<div class="fc-pileface empty">-</div>') + '</div>' +
      '</div>';

    // ---- round-end summary / match over ----
    if (STATE.phase === 'roundEnd') {
      var lr = STATE.lastRound || { penalty: {}, outSeat: null };
      var rows = '';
      for (var s2 = 0; s2 < numSeats(); s2++) {
        var mark = (lr.outSeat === s2) ? ' <span class="chip out">went out</span>' : '';
        rows += '<div class="result-row"><div class="who' + (s2 === mySeat ? ' us' : '') + '">' + esc(seatNameFor(s2)) + mark +
          '</div><span class="delta">+' + (lr.penalty[s2] || 0) + ' (' + (STATE.scores[s2] || 0) + ')</span></div>';
      }
      var overlay = '';
      if (STATE.winner != null) {
        var again = (MODE === 'localGame') ? '<button class="btn-accent btn" data-act="play-again">Next match</button>' : '<button class="btn-accent btn" data-act="home">Back to start</button>';
        overlay = '<div class="overlay"><div class="sheet"><div class="eyebrow">Match over</div>' +
          '<h2>' + (STATE.winner === mySeat ? '<span class="gg-win">You win!</span>' : esc(seatNameFor(STATE.winner)) + ' wins') + '</h2>' +
          rows + '<div class="actions"><button class="btn btn-ghost" data-act="home">Home</button>' + again + '</div></div></div>';
      }
      var nextBtn = (STATE.winner == null) ? '<button class="btn btn-accent" data-act="fc-next-round">Next round</button>' : '';
      var prompt = '<div class="prompt">Round ' + STATE.round + ' over. Lowest total is winning.</div>' + rows +
        '<div class="row" style="margin-top:8px">' + nextBtn + '</div>';
      app.innerHTML = quitHeader(fcHeader()) + banner + top + '<div class="center-note">' + center + '</div>' +
        '<div class="controls">' + prompt + '</div>' + genericLog(STATE) + overlay;
      afterDispatchScroll();
      return;
    }

    // ---- staged melds area ----
    var meldsHtml = '';
    if (fcMelds.length) {
      meldsHtml = '<div class="fc-melds"><div class="eyebrow">Laid down</div><div class="fc-meld-rows">' +
        fcMelds.map(function (g, mi) {
          var cards = g.map(fcCardById).filter(Boolean).map(function (c) { return fcCardFace(c, { small: true }); }).join('');
          return '<div class="fc-meld"><div class="fc-meld-cards">' + cards + '</div>' +
            '<button class="btn btn-ghost btn-sm" data-act="fc-unmeld" data-mi="' + mi + '">Break</button></div>';
        }).join('') + '</div></div>';
    }

    // ---- controls ----
    var prompt;
    if (!myTurn) {
      var lap = (STATE.goneOut != null) ? ' (last turns before scoring)' : '';
      prompt = '<div class="muted">Waiting on ' + esc(seatNameFor(STATE.turnSeat)) + '\u2026' + lap + '</div>';
    } else if (STATE.turnPhase === 'draw') {
      var takeLabel = discardTop ? (discardTop.joker ? 'joker' : G.rankLabel(discardTop.rank) + fcSuitSym(discardTop.suit)) : '';
      prompt = '<div class="prompt">Draw to start your turn.</div>' +
        '<div class="row" style="margin-top:8px">' +
          '<button class="btn btn-accent" data-act="fc-draw-stock">Draw stock</button>' +
          (discardTop ? '<button class="btn" data-act="fc-draw-discard">Take discard (' + takeLabel + ')</button>' : '') +
        '</div>';
    } else {
      // acting: build melds + go out / discard
      var handSize = G.handSizeFor(STATE.round);
      var meldedCount = 0; fcMelds.forEach(function (g) { meldedCount += g.length; });
      var selCards = fcSel.map(fcCardById).filter(Boolean);
      var selValid = selCards.length >= 3 && G.isValidMeld(selCards, STATE.wildRank);
      var formBtn = '<button class="btn" data-act="fc-form"' + (selValid ? '' : ' disabled') + '>Form meld (' + fcSel.length + ')</button>';
      var selHint = '';
      if (fcSel.length >= 3 && !selValid) selHint = '<div class="note">Those cards are not a valid run or set.</div>';
      else if (fcSel.length >= 1 && fcSel.length < 3) selHint = '<div class="note">A meld needs 3+ cards. Select more, or discard one to end your turn.</div>';

      var actionBtns = '';
      if (STATE.goneOut == null) {
        // go out when everything but one card is melded
        var canGoOut = meldedCount === handSize && fcMelds.length > 0;
        var leftover = fcAvailableCards();
        var goLabel = (canGoOut && leftover.length === 1) ? (leftover[0].joker ? 'joker' : G.rankLabel(leftover[0].rank) + fcSuitSym(leftover[0].suit)) : '';
        actionBtns =
          formBtn +
          '<button class="btn btn-danger" data-act="fc-discard"' + (fcSel.length === 1 ? '' : ' disabled') + '>Discard selected</button>' +
          '<button class="btn-accent btn" data-act="fc-go-out"' + (canGoOut && leftover.length === 1 ? '' : ' disabled') + '>Go out' + (goLabel ? ' (discard ' + goLabel + ')' : '') + '</button>';
        prompt = '<div class="prompt">Lay down runs and sets to go out, or discard one card to end your turn.</div>' + selHint +
          '<div class="row fc-actions">' + actionBtns + '</div>';
      } else {
        // final lap: lay down what you can, then discard one
        actionBtns =
          formBtn +
          '<button class="btn-accent btn" data-act="fc-laydown"' + (fcSel.length === 1 ? '' : ' disabled') + '>Lay down &amp; discard selected</button>';
        prompt = '<div class="prompt">' + esc(seatNameFor(STATE.goneOut)) + ' went out. Your last turn: lay down any melds, then discard one card.</div>' + selHint +
          '<div class="row fc-actions">' + actionBtns + '</div>';
      }
    }

    // ---- my hand ----
    var mine = '';
    var avail = fcAvailableCards();
    var handCards = avail.map(function (c) {
      return fcCardFace(c, { tappable: acting, selected: fcSel.indexOf(c.id) >= 0 });
    }).join('');
    mine = '<div class="fc-mine"><div class="eyebrow">Your hand' + (acting ? '' : ' (waiting)') + '</div>' +
      '<div class="fc-hand">' + (handCards || '<span class="muted">no cards</span>') + '</div></div>';

    app.innerHTML = quitHeader(fcHeader()) + banner + top + '<div class="center-note">' + center + '</div>' +
      '<div class="controls">' + prompt + '</div>' + meldsHtml + mine + genericLog(STATE);
    afterDispatchScroll();
  }
  function fcHeader() { return MODE === 'onlineGame' ? 'Room ' + esc(roomCode || '') + ' \u00b7 Five Crowns' : 'Five Crowns'; }

  // ================================================================ WAR ===
  function renderWarTable() {
    var opp = (mySeat === 0) ? 1 : 0;
    function cnt(seat) { return (STATE.piles && STATE.piles[seat]) ? STATE.piles[seat].length : 0; }
    function meta(seat) {
      var n = cnt(seat);
      return '<div class="meta-line"><span>' + n + ' card' + (n === 1 ? '' : 's') + '</span></div>';
    }
    function chip(seat) { return personChip(seat, false, meta(seat)); }

    var laneCss = 'display:flex;align-items:flex-start;justify-content:center;gap:18px;margin:4px 0 2px';
    var slotCss = 'display:flex;flex-direction:column;align-items:center;gap:6px';
    var capCss = 'font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)';
    var midCss = 'align-self:center;min-width:44px;text-align:center';

    var lb = STATE.lastBattle, center;
    if (lb && lb.reveals && lb.reveals.length) {
      var last = lb.reveals[lb.reveals.length - 1];
      var oppCard = (opp === 0) ? last.a : last.b;
      var myCard = (mySeat === 0) ? last.a : last.b;
      var mid = lb.war
        ? '<div style="color:var(--brass);font-weight:800;letter-spacing:.08em">WAR</div>'
        : '<div class="muted" style="font-weight:700">vs</div>';
      center =
        '<div style="' + laneCss + '">' +
          '<div style="' + slotCss + '"><div style="' + capCss + '">' + esc(seatNameFor(opp)) + '</div>' + cardFaceHTML(oppCard, true) + '</div>' +
          '<div style="' + midCss + '">' + mid + '</div>' +
          '<div style="' + slotCss + '"><div style="' + capCss + '">You</div>' + cardFaceHTML(myCard, true) + '</div>' +
        '</div>';
      if (STATE.phase !== 'finished') {
        var who = (lb.winner === mySeat) ? 'You take' : esc(seatNameFor(lb.winner)) + ' takes';
        center += '<div style="text-align:center;margin-top:6px">' + who + ' ' + lb.potSize + ' card' + (lb.potSize === 1 ? '' : 's') + (lb.war ? ' after the war' : '') + '.</div>';
      }
    } else {
      center =
        '<div style="' + laneCss + '">' +
          '<div style="' + slotCss + '"><div style="' + capCss + '">' + esc(seatNameFor(opp)) + '</div><span class="card-face mini back"></span></div>' +
          '<div style="' + midCss + '"><div class="muted" style="font-weight:700">vs</div></div>' +
          '<div style="' + slotCss + '"><div style="' + capCss + '">You</div><span class="card-face mini back"></span></div>' +
        '</div>' +
        '<div class="muted" style="text-align:center;margin-top:6px">Tap Flip to reveal the top cards.</div>';
    }

    var felt = simpleFelt(chip, center);

    var controls = '';
    if (STATE.phase === 'playing') {
      var canFlip = cnt(mySeat) > 0 && cnt(opp) > 0;
      controls = '<div class="controls" style="text-align:center"><button class="btn-accent btn"' +
        (canFlip ? '' : ' disabled') + ' data-act="war-flip">Flip</button></div>';
    }

    var overlay = '';
    if (STATE.phase === 'finished') {
      var again = (MODE === 'localGame') ? '<button class="btn-accent btn" data-act="play-again">Next match</button>' : '<button class="btn-accent btn" data-act="home">Back to start</button>';
      var rows = '';
      for (var s = 0; s < 2; s++) {
        rows += '<div class="result-row"><div class="who' + (s === mySeat ? ' us' : '') + '">' + esc(seatNameFor(s)) + '</div><span class="delta">' + cnt(s) + ' cards</span></div>';
      }
      var head = (STATE.winner == null)
        ? 'A draw'
        : ((STATE.winner === mySeat) ? '<span class="gg-win">You win!</span>' : esc(seatNameFor(STATE.winner)) + ' wins');
      overlay = '<div class="overlay"><div class="sheet"><div class="eyebrow">Game over</div><h2>' + head + '</h2>' +
        rows + '<div class="actions"><button class="btn btn-ghost" data-act="home">Home</button>' + again + '</div></div></div>';
    }

    app.innerHTML = quitHeader(MODE === 'onlineGame' ? 'Room ' + esc(roomCode || '') + ' \u00b7 War' : 'War') +
      felt + controls + genericLog(STATE) + overlay;
    afterDispatchScroll();
  }

  // ----------------------------------------------------------- local runner
  function startLocal() {
    var nm = val('nameInput'); if (nm) { myName = nm; rememberName(); }
    botDifficulty = 'expert'; // bots always expert
    var strict = $('strictModeInput');
    if (strict) strictMode = strict.value === 'true';
    MODE = 'localGame'; mySeat = 0;
    gfRank = null; biSel = []; unoWildPick = null; sbSel = null;
    // Seat count: BAB is fixed at 4, other games honor the chosen 2-8 (Skip-Bo 2-6).
    var scSel = $('seatCountInput');
    if (scSel && GAME !== 'bab') chosenSeats = parseInt(scSel.value, 10) || 4;
    var N = numSeats();
    var seats = {}; seats[0] = { name: myName || 'You', isBot: false, playerId: 'you' };
    var G = eng();
    STATE = G.newLobbyState(seats, N);
    STATE = G.reduce(STATE, { type: 'startGame' });
    if (GAME === 'bab') STATE.strictMode = strictMode; // Store strictMode in state for renege detection
    render();
    scheduleLocal();
  }
  function dispatchLocal(action) {
    STATE = eng().reduce(STATE, action);
    render();
    scheduleLocal();
  }
  function scheduleLocal() {
    if (localTimer) { clearTimeout(localTimer); localTimer = null; }
    if (!STATE) return;
    if (GAME === 'bab') {
      if (STATE.phase === 'playing' && STATE.awaitingTrickClear) {
        localTimer = setTimeout(function () { dispatchLocal({ type: 'clearTrick' }); }, TRICK_HOLD);
      } else if ((STATE.phase === 'bidding' || STATE.phase === 'playing') && isBotSeat(STATE.turnSeat)) {
        var delay = STATE.phase === 'bidding' ? BID_DELAY : PLAY_DELAY;
        localTimer = setTimeout(function () { var a = E.botAction(STATE, botDifficulty); if (a) dispatchLocal(a); }, delay);
      } else if (STATE.phase === 'handScored') {
        localTimer = setTimeout(function () { dispatchLocal({ type: 'nextHand' }); }, NEXT_DELAY);
      }
      return;
    }
    // Old Maid / Go Fish / Blow It: autoStep covers bot moves AND forced
    // continuations (bust pauses, empty-hand draws) uniformly.
    var step = eng().autoStep(STATE, botDifficulty);
    if (step) localTimer = setTimeout(function () { dispatchLocal(step.action); }, step.delay);
  }
  function playAgainLocal() { startLocal(); }

  // ----------------------------------------------------------- online runner
  function goOnline() {
    var nm = val('nameInput'); if (nm) { myName = nm; rememberName(); }
    if (!window.firebase) { render(); return; }
    if (!(FB && FB.databaseURL)) { renderFbSetup(); return; }
    MODE = 'onlineLobby'; room = null; roomCode = null;
    app.innerHTML =
      '<div class="spread" style="margin-bottom:10px"><div class="eyebrow">Online</div>' +
      '<button class="btn btn-ghost btn-sm" data-act="home">Back</button></div>' +
      '<div class="card-panel" style="max-width:460px;margin:0 auto">' +
        '<div class="field"><label for="nameInput2">Your name</label>' +
        '<input id="nameInput2" type="text" maxlength="18" value="' + esc(myName === 'You' ? '' : myName) + '" placeholder="Your name"></div>' +
        '<hr class="divider">' +
        '<button class="btn-accent btn" style="width:100%" data-act="create-room">Create a room</button>' +
        '<div class="note">You become the host. Share the invite link that appears. Players need no account.</div>' +
        '<hr class="divider">' +
        '<div class="field"><label for="codeInput">Join with a code</label>' +
        '<input id="codeInput" type="text" maxlength="4" autocapitalize="characters" autocomplete="off" placeholder="ABCD" value="' + esc(lastRoom()) + '"></div>' +
        '<button class="btn" style="width:100%" data-act="join-room">Join room</button>' +
        '<button class="btn btn-ghost btn-sm" style="width:100%;margin-top:6px" data-act="watch-audience">Watch as audience</button>' +
        '<div class="note">The audience holds no seat. You can talk trash and blast the screen, but you cannot play.</div>' +
        '<div id="onlineErr" class="note warn-note"></div>' +
      '</div>';
  }

  // One-time host setup: paste the firebaseConfig snippet from the Firebase
  // console. Guests never see this screen because invite links carry the config.
  function renderFbSetup() {
    MODE = 'home';
    app.innerHTML =
      '<div class="spread" style="margin-bottom:10px"><div class="eyebrow">Online setup</div>' +
      '<button class="btn btn-ghost btn-sm" data-act="home">Back</button></div>' +
      '<div class="card-panel" style="max-width:520px;margin:0 auto">' +
        '<div class="eyebrow">One time, host only</div>' +
        '<p class="muted" style="margin:8px 0 4px">If someone sent you an invite link, you do not need this. Just open their link.</p>' +
        '<p class="muted" style="margin:4px 0 10px">Hosting for the first time: in the Firebase console open Project settings, Your apps, and copy the whole <span style="color:var(--brass)">firebaseConfig</span> block. Paste it below exactly as copied.</p>' +
        '<div class="field"><label for="fbConfigInput">Paste firebaseConfig here</label>' +
        '<textarea id="fbConfigInput" rows="8" style="width:100%;background:#11150f;color:var(--bone);border:1px solid var(--line);border-radius:4px;padding:10px;font-family:monospace;font-size:13px" placeholder=\'const firebaseConfig = {\n  apiKey: "...",\n  databaseURL: "https://...firebaseio.com",\n  ...\n};\'></textarea></div>' +
        '<button class="btn-accent btn" style="width:100%" data-act="save-fb">Save and continue</button>' +
        '<div id="fbErr" class="note warn-note"></div>' +
      '</div>';
  }
  function saveFbConfig() {
    var raw = ($('fbConfigInput') && $('fbConfigInput').value) || '';
    var cfg = null;
    try { cfg = JSON.parse(raw); } catch (e) { cfg = null; }
    if (!cfg) {
      cfg = {};
      var m, re = /(\w+)\s*:\s*["']([^"']*)["']/g;
      while ((m = re.exec(raw)) !== null) cfg[m[1]] = m[2];
    }
    if (!cfg.databaseURL || !/^https:\/\//.test(cfg.databaseURL)) {
      var e2 = $('fbErr');
      if (e2) e2.textContent = 'No databaseURL found. In Firebase, create a Realtime Database first, then re-copy the config (it must include databaseURL).';
      return;
    }
    FB = cfg;
    persistFb(cfg);
    // Show a setup link the user can bookmark so they never have to paste again.

  // Host writes the whole authoritative room doc as one JSON string; every guest

  // Probe for a room code that is not currently in use (no doc, or a stale one

  function findFreeCode(attemptsLeft, cb) {

  function joinRoom() {

        var r = safeParse(raw);

          // name after a reopen) or a bot is filling a seat you can take over.
          var g = r.gameJSON ? safeParse(r.gameJSON) : null;
          var held = -1, botSeat = -1;

  }

  // ---- host duties: assign seats from presence, apply incoming moves, heartbeat ----
  function startHostDuties() {
    if (hostBeatTimer) clearInterval(hostBeatTimer);
    var pRef = db.ref(roomPath() + '/players');
    var onPlayers = pRef.on('value', function (snap) {
      if (!isHost) return;
      var players = [];
      snap.forEach(function (c) { var p = c.val(); if (p) players.push(p); });
      players.sort(function (a, b) { return a.ts - b.ts; });
      if (roomPhase() === 'lobby') {
        var N = numSeats();
        var arr = []; for (var z = 0; z < N; z++) arr.push(null);
        room = room || {}; room.numSeats = N;
        if (GAME === 'bab') {
          // Seats 0,2 are Team A; 1,3 are Team B. Honor chosen teams, balance the rest.
          var aSeats = [0, 2], bSeats = [1, 3], ai = 0, bi = 0;
          var everyone = [{ id: myId, name: myName || 'Host', team: myTeamPref }].concat(
            players.filter(function (p) { return p.id !== myId; }).map(function (p) {

        } else {

  // Host-only: keep the in-game seat array in sync with who is actually present.
  var PRESENCE_STALE = 12000;
  var SEAT_GRACE = 30000; // retained for signature compatibility; human seats are never auto-converted to bots

  // Pure, testable seat planner. Returning humans reclaim their own seat (by stable
  // id, then remembered name, then a bot the host manually created for them). A
  // vacated human seat is NEVER auto-converted to a bot: it stays theirs so a refresh
  // or browser close can always rejoin the same seat. Its turn simply waits. A seat
  // becomes a bot only by explicit host action elsewhere (stamped wasHuman/humanName
  // so the human can still reclaim it on return).
  function planSeatReconciliation(seats, presentList, now, opts) {
    opts = opts || {};
    var staleMs = opts.staleMs != null ? opts.staleMs : 12000;
    var selfId = opts.myId, selfName = opts.myName || 'Host';
    var N = opts.seatCount || seats.length;
    var out = seats.map(function (s) { return s ? JSON.parse(JSON.stringify(s)) : null; });
    var changed = false;

    var presentById = {}, presentByName = {};
    (presentList || []).forEach(function (p) {
      if (p && p.id && (now - (p.ts || 0) < staleMs)) presentById[p.id] = p;
    });
    if (selfId) presentById[selfId] = presentById[selfId] || { id: selfId, name: selfName, ts: now };
    Object.keys(presentById).forEach(function (pid) {
      var p = presentById[pid]; if (p && p.name) presentByName[String(p.name).toLowerCase()] = p;
    });
    function ownerPresent(seat) {
      if (!seat) return false;
      if (seat.playerId && presentById[seat.playerId]) return true;

    function liveIds() {

    }

    // A) Present humans not holding a live seat reclaim their own seat: by id, then by
    //    remembered name (only a seat whose bound id is itself absent, so a stranger
    //    sharing a name can never boot a live holder), then a bot stamped for them.
    Object.keys(presentById).forEach(function (pid) {
      if (liveIds()[pid]) return;
      var p = presentById[pid], nm = String(p.name || '').toLowerCase(), target = -1, i;
      for (i = 0; i < N; i++) { var a = out[i]; if (a && !a.isBot && a.playerId === pid) { target = i; break; } }
      if (target < 0 && nm) for (i = 0; i < N; i++) {
        var b = out[i];
        if (b && !b.isBot && b.name && String(b.name).toLowerCase() === nm && !presentById[b.playerId]) { target = i; break; }
      }
      if (target < 0 && nm) for (i = 0; i < N; i++) {
        var c = out[i];
        if (c && c.isBot && c.wasHuman && c.humanName && String(c.humanName).toLowerCase() === nm) { target = i; break; }
      }
      if (target < 0) for (i = 0; i < N; i++) { var d = out[i]; if (d && d.isBot && d.playerId === pid) { target = i; break; } }

      } else if (!seat.absentSince) {

      }

  }

  function reconcileSeatsInGame(players) {

      seatCount: N, botNames: pickBotNames(BOT_NAMES.length)

  function applyHost(action) {

  function scheduleHostFollowup() {

  function startGameOnline() {
    if (!isHost) return;

    var seatsObj = arrayToSeats(room.seats);
    var N = (room && room.numSeats) || numSeats();
    var G = eng();
    STATE = G.newLobbyState(seatsObj, N);
    STATE = G.reduce(STATE, { type: 'startGame' });

    // Guarantee every seat carries a display name (bots included), distinct from
    // any human name already seated.
    var takenNm = {};
    for (var tt = 0; tt < N; tt++) { var exx = STATE.seats[tt]; if (exx && exx.name) takenNm[exx.name] = true; }
    var poolNm = pickBotNames(BOT_NAMES.length).filter(function (n) { return !takenNm[n]; });
    var pmi = 0;
    for (var s = 0; s < N; s++) {

    scheduleHostFollowup();
    render();

  // ---- guest: subscribe to the room doc; adopt host if the host drops ----
  function attachRoomListener() {
    detachListeners();
    var rref = db.ref(roomPath());
    var cb = rref.on('value', function (snap) {
      var v = snap.val() || {};
      if (isHost) return; // host is authoritative; ignore echoes of its own writes
      var hostNode = v.host || {};
      var r = v.doc ? safeParse(v.doc) : null;
      if (r) {
        room = r;
        GAME = (r.game && GAME_META[r.game]) ? r.game : 'bab';
        if (r.numSeats) chosenSeats = r.numSeats;
        if (r.ver !== lastVer) {

          if (r.phase === 'lobby') { MODE = 'onlineLobby'; STATE = null; }
          else if (r.gameJSON) { STATE = safeParse(r.gameJSON); MODE = 'onlineGame'; }

  }
  function amLowestHuman(deadHostId) {

    for (var i = 0; i < arr.length; i++) {
      var s = arr[i];
      if (!s || s.isBot || !s.playerId) continue;
      if (s.playerId === myId) return true;          // I hold a seat: eligible.
      if (s.playerId !== deadHostId) return false;   // A different human is seated ahead of me: they host.
    }
    // No human besides the stale host is seated (or I am not seated yet, e.g. I
    // rejoined by link with a fresh id and my old seat is an orphan bound to the
    // dead host). A present human may still claim. becomeHost() runs a transaction
    // on the host node, so if several unseated players attempt this at once exactly
    // one wins and the rest abort. This is what breaks the deadlock that otherwise
    // left the orphan seat in place and the room unplayable.

  }
  function becomeHost() {
    if (isHost || !db || isAudience) return;
    // Claim the host slot atomically. If a live host still holds it the claim
    // aborts, so two players who both detect a stale host cannot both take over.
    db.ref(roomPath() + '/host').transaction(function (cur) {
      if (cur && cur.id && (Date.now() - (cur.beat || 0)) <= HOST_STALE) return; // live host: abort
      return { id: myId, beat: Date.now() };
    }, function (err, committed, snap) {

      var v = snap && snap.val();

      isHost = true;
      detachListeners();
      if (room && room.gameJSON && !STATE) STATE = safeParse(room.gameJSON);
      mySeat = computeMySeat(); if (mySeat < 0) mySeat = 0;
      writeRoom();
      startHostDuties();
      scheduleHostFollowup();
      render();
    }, false);
  }

  function submitOnline(action) {
    if (isAudience) return; // the audience holds no seat and cannot act
    if (isHost) { applyHost(action); return; }
    if (!db) return;
    awaiting = true;
    db.ref(roomPath() + '/moves/' + mySeat).set({ action: action, ts: Date.now() });
    render();
  }

  // ---- auto-rejoin after an accidental reload (refresh or browser close) --------
  // Makes a refresh or a closed browser recoverable: silently rejoin the remembered
  // room and reclaim the seat by stable id (or name). A deliberate exit clears the
  // remembered room via forgetRoom(), so this only fires after an accidental reload.
  function autoRejoin() {
    var code = lastRoom();
    if (!code || !/^[A-Z]{4}$/i.test(code)) return;
    if (!(FB && FB.databaseURL) || !window.firebase) return;
    code = code.toUpperCase();
    ensureFirebase().then(function (ok) {
      if (!ok) return;
      roomCode = code;
      docRef().once('value').then(function (snap) {
        var raw = snap.val();
        if (!raw) { roomCode = null; forgetRoom(); return; }
        var r = safeParse(raw);
        if (!r) { roomCode = null; return; }
        if (r.phase === 'finished' || r.winner != null) { roomCode = null; forgetRoom(); return; }
        isHost = false; room = r; lastVer = -1;
        GAME = (r.game && GAME_META[r.game]) ? r.game : 'bab';
        if (r.numSeats) chosenSeats = r.numSeats;
        rememberRoom(code);
        addPresence();
        attachRoomListener();
        MODE = (r.phase && r.phase !== 'lobby') ? 'onlineGame' : 'onlineLobby';
        mySeat = computeMySeat(); if (mySeat < 0) mySeat = 0;
        render();
      }).catch(function () { roomCode = null; });
    });
  }

  // ----------------------------------------------------------- teardown
  function leaveToHome() {
    // A deliberate quit out of a game still in progress counts as an abandon.
    if (!isAudience && roomCode && db && STATE && MODE === 'onlineGame' && !gameIsOver(STATE, GAME) && computeMySeat() >= 0) {
      lbBump(GAME, chatDisplayName(), { abandon: true });
    }
    stopTurnNag(); stopForcedNag();
    if (localTimer) { clearTimeout(localTimer); localTimer = null; }
    if (hostTimer) { clearTimeout(hostTimer); hostTimer = null; }
    if (hostBeatTimer) { clearInterval(hostBeatTimer); hostBeatTimer = null; }
    stopPresence();
    stopChat();
    stopFx(); stopTeamNames(); stopAudienceWatch();
    if (isAudience) stopAudiencePresence();
    detachListeners();
    if (roomCode && db && myId) {
      try { db.ref(roomPath() + '/players/' + myId).onDisconnect().cancel().catch(function () {}); } catch (e) {}
      db.ref(roomPath() + '/players/' + myId).remove().catch(function () {});
    }
    forgetRoom(); // deliberate exit: do not auto-rejoin this room on next load
    roomCode = null; isHost = false; room = null; roomLive = false; lastVer = -1; awaiting = false;
    isAudience = false; audienceList = []; lbShownKey = null; lbRecordedKey = null;
    STATE = null; MODE = 'home'; mySeat = 0;
    render();
  }

  // ----------------------------------------------------------- share helpers
  function copyCode() {
    if (!roomCode) return;
    if (navigator.clipboard) navigator.clipboard.writeText(roomCode).catch(function () {});
    var b = document.querySelector('[data-act="copy-code"]');
    if (b) { var t = b.textContent; b.textContent = 'Copied'; setTimeout(function () { b.textContent = t; }, 1200); }
  }
  // The invite link carries the Firebase config and the room code in the hash,
  // so a family member who taps it lands fully configured with the code prefilled.
  function inviteURL() {
    var base = location.origin + location.pathname;
    var fb = b64enc(JSON.stringify(FB));
    return base + '#fb=' + encodeURIComponent(fb) + (roomCode ? '&room=' + roomCode : '');
  }
  function copyInvite() {
    if (navigator.clipboard) navigator.clipboard.writeText(inviteURL()).catch(function () {});
    var b = document.querySelector('[data-act="copy-invite"]');
    if (b) { var t = b.textContent; b.textContent = 'Copied'; setTimeout(function () { b.textContent = t; }, 1200); }
  }
  function shareRoom() {
    if (!navigator.share) return copyInvite();
    navigator.share({
      title: 'Back Alley Bridge',
      text: 'Join my Back Alley Bridge game. Tap the link, then Play online. Room code: ' + roomCode,
      url: inviteURL()
    }).catch(function () {});
  }

  // ----------------------------------------------------------- click routing
  // Chat controls (separate from the game click router; chat uses data-chat).
  document.addEventListener('click', function (e) {
    var c = e.target.closest('[data-chat]');
    if (!c) return;
    var action = c.getAttribute('data-chat');
    unlockAudio();
    if (action === 'open') { chatOpen = true; chatUnread = 0; renderChat(); }
    else if (action === 'close') { chatOpen = false; renderChat(); }
    else if (action === 'send') {
      var input = document.getElementById('chatInput');
      if (input) { sendChat(input.value); input.value = ''; input.focus(); }
    }
    else if (action === 'fx-banner') {
      var t = window.prompt('Banner to blast across everyone\'s screen:');
      if (t) sendFxBanner(t);
    }
    else if (action === 'fx-wasted') { sendFxWasted(); }
    else if (action === 'fx-nag') { sendFxNag(); }
  });
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && e.target && e.target.id === 'chatInput') {
      e.preventDefault();
      sendChat(e.target.value); e.target.value = '';
    }
  });

  document.addEventListener('click', function (e) {
    var el = e.target.closest('[data-act]');
    if (!el) return;
    var act = el.getAttribute('data-act');
    unlockAudio();
    switch (act) {
      case 'pick-game': {
        var g = el.getAttribute('data-game');
        if (g && GAME_META[g]) { GAME = g; MODE = 'gameSetup'; render(); }
        break;
      }
      case 'back-picker': MODE = 'home'; render(); break;
      case 'local-start': startLocal(); break;
      case 'go-online': goOnline(); break;
      case 'create-room': createRoom(); break;
      case 'join-room': joinRoom(); break;
      case 'watch-audience': joinAudience(); break;
      case 'team-rename': {
        var letter = myTeamLetter();
        if (!letter) break;
        var cur = teamNameIdx(letter === 'A' ? 0 : 1);
        var nn = window.prompt('Name your team:', (cur === 'Team A' || cur === 'Team B') ? '' : cur);
        if (nn != null) setTeamName(letter, nn);
        break;
      }
      case 'start-game': startGameOnline(); break;
      case 'fill-bot': { var fbi = parseInt(el.getAttribute('data-seat'), 10); if (!isNaN(fbi)) botFillSeat(fbi); break; }
      case 'team-a': setTeamPref('A'); break;
      case 'team-b': setTeamPref('B'); break;
      case 'copy-code': copyCode(); break;
      case 'copy-invite': copyInvite(); break;
      case 'save-fb': saveFbConfig(); break;
      case 'copy-setup-link': copySetupLink(); break;
      case 'share-setup-link': shareSetupLink(); break;
      case 'continue-hosting': continueHosting(); break;
      case 'share-room': shareRoom(); break;
      case 'home': leaveToHome(); break;
      case 'play-again': playAgainLocal(); break;
      case 'next-hand':
        if (MODE === 'localGame') dispatchLocal({ type: 'nextHand' });
        else submitOnline({ type: 'nextHand' });
        break;
      case 'play-card': {
        var cid = el.getAttribute('data-card');
        var a1 = { type: 'play', seat: mySeat, cardId: cid };
        if (MODE === 'localGame') dispatchLocal(a1); else submitOnline(a1);
        break;
      }
      case 'bid': {
        var bt = el.getAttribute('data-bidtype');
        var bid = { type: bt };
        if (bt === 'num') bid.value = parseInt(el.getAttribute('data-bidval'), 10);
        var a2 = { type: 'bid', seat: mySeat, bid: bid };
        if (MODE === 'localGame') dispatchLocal(a2); else submitOnline(a2);
        break;
      }
      // ---- Old Maid ----
      case 'om-draw': {
        var idx = parseInt(el.getAttribute('data-index'), 10);
        doAct({ type: 'draw', seat: mySeat, index: idx });
        break;
      }
      // ---- War ----
      case 'war-flip': doAct({ type: 'flip', seat: mySeat }); break;
      // ---- Go Fish ----
      case 'gf-pick-rank': {
        gfRank = parseInt(el.getAttribute('data-rank'), 10);
        render();
        break;
      }
      case 'gf-cancel-rank': {
        gfRank = null;
        render();
        break;
      }
      case 'gf-ask-target': {
        var target = parseInt(el.getAttribute('data-target'), 10);
        var rank = parseInt(el.getAttribute('data-rank'), 10);
        gfRank = null;
        doAct({ type: 'ask', seat: mySeat, target: target, rank: rank });
        break;
      }
      // ---- Blow It ----
      case 'bi-roll': {
        doAct({ type: 'roll', seat: mySeat });
        break;
      }
      case 'bi-toggle-die': {
        var di = parseInt(el.getAttribute('data-index'), 10);
        var pos = biSel.indexOf(di);
        if (pos >= 0) biSel.splice(pos, 1); else biSel.push(di);
        render();
        break;
      }
      case 'bi-keep-roll': {
        var idxsR = biSel.slice(); biSel = [];
        doAct({ type: 'keep', seat: mySeat, indices: idxsR, then: 'roll' });
        break;
      }
      case 'bi-keep-bank': {
        var idxsB = biSel.slice(); biSel = [];
        doAct({ type: 'keep', seat: mySeat, indices: idxsB, then: 'bank' });
        break;
      }
      case 'bi-end-turn': {
        doAct({ type: 'endTurn', seat: mySeat });
        break;
      }
      // ---- UNO ----
      case 'uno-play': {
        var ucid = el.getAttribute('data-card');
        var ucard = (STATE.hands[mySeat] || []).filter(function (c) { return c.id === ucid; })[0];
        if (!ucard) break;
        if (ucard.kind === 'wild' || ucard.kind === 'wild4') {
          unoWildPick = { cardId: ucid, fromDrawn: false };
          render();
        } else {
          doAct({ type: 'play', seat: mySeat, cardId: ucid });
        }
        break;
      }
      case 'uno-play-drawn': {
        var dcard = (STATE.hands[mySeat] || []).filter(function (c) { return c.id === STATE.drawnCardId; })[0];
        if (dcard && (dcard.kind === 'wild' || dcard.kind === 'wild4')) {
          unoWildPick = { cardId: STATE.drawnCardId, fromDrawn: true };
          render();
        } else {
          doAct({ type: 'playDrawn', seat: mySeat });
        }
        break;
      }
      case 'uno-pick-color': {
        var col = el.getAttribute('data-color');
        if (!unoWildPick) break;
        var fromDrawn = unoWildPick.fromDrawn;
        var pcid = unoWildPick.cardId;
        unoWildPick = null;
        if (fromDrawn) doAct({ type: 'playDrawn', seat: mySeat, chosenColor: col });
        else doAct({ type: 'play', seat: mySeat, cardId: pcid, chosenColor: col });
        break;
      }
      case 'uno-cancel-wild': {
        unoWildPick = null;
        render();
        break;
      }
      case 'uno-draw': {
        unoWildPick = null;
        doAct({ type: 'draw', seat: mySeat });
        break;
      }
      case 'uno-pass': {
        doAct({ type: 'pass', seat: mySeat });
        break;
      }
      // ---- Skyjo ----
      case 'sky-draw-stock': {
        skyDiscardMode = false;
        doAct({ type: 'drawStock', seat: mySeat });
        break;
      }
      case 'sky-draw-discard': {
        skyDiscardMode = false;
        doAct({ type: 'drawDiscard', seat: mySeat });
        break;
      }
      case 'sky-discard-mode': {
        skyDiscardMode = true;
        render();
        break;
      }
      case 'sky-slot-tap': {
        var slot = parseInt(el.getAttribute('data-slot'), 10);
        var grid = STATE.grids[mySeat];
        if (skyDiscardMode && STATE.drawnFrom === 'stock') {
          // discard the held card and flip a face-down slot
          if (grid[slot] && !grid[slot].faceUp) {
            skyDiscardMode = false;
            doAct({ type: 'discardAndFlip', seat: mySeat, slot: slot });
          }
        } else {
          // swap held card into this slot (works for face-up or face-down)
          skyDiscardMode = false;
          doAct({ type: 'placeDrawn', seat: mySeat, slot: slot });
        }
        break;
      }
      case 'sky-next-round': {
        if (MODE === 'localGame') dispatchLocal({ type: 'nextRound' });
        else submitOnline({ type: 'nextRound' });
        break;
      }
      // ---- Skip-Bo ----
      case 'sb-pick-source': {
        var src = el.getAttribute('data-source');
        var scid = el.getAttribute('data-card');
        sbDiscardChoosing = false;
        if (src === 'discard') {
          sbSel = { source: 'discard', cardId: scid, discardPileIndex: parseInt(el.getAttribute('data-dpi'), 10) };
        } else {
          sbSel = { source: src, cardId: scid };
        }
        render();
        break;
      }
      case 'sb-cancel-source': {
        sbSel = null;
        render();
        break;
      }
      case 'sb-target-pile': {
        if (!sbSel) break;
        var pileIndex = parseInt(el.getAttribute('data-pile'), 10);
        var act2 = { type: 'playCard', seat: mySeat, source: sbSel.source, pileIndex: pileIndex };
        if (sbSel.source !== 'stock') act2.cardId = sbSel.cardId;
        if (sbSel.source === 'discard') act2.discardPileIndex = sbSel.discardPileIndex;
        sbSel = null;
        doAct(act2);
        break;
      }
      case 'sb-start-discard': {
        // must have a hand card selected to discard it
        if (!sbSel || sbSel.source !== 'hand') break;
        sbDiscardChoosing = true;
        render();
        break;
      }
      case 'sb-cancel-discard': {
        sbDiscardChoosing = false;
        render();
        break;
      }
      case 'sb-discard-target': {
        if (!sbDiscardChoosing || !sbSel || sbSel.source !== 'hand') break;
        var dpIndex = parseInt(el.getAttribute('data-pile'), 10);
        var handCard = STATE.hands[mySeat].filter(function (c) { return c.id === sbSel.cardId; })[0];
        if (!handCard) { sbDiscardChoosing = false; sbSel = null; render(); break; }
        var discardCardId = handCard.id;
        sbDiscardChoosing = false;
        sbSel = null;
        doAct({ type: 'discardToPile', seat: mySeat, cardId: discardCardId, discardPileIndex: dpIndex });
        break;
      }
      case 'sb-skip': {
        sbSel = null; sbDiscardChoosing = false;
        doAct({ type: 'skipTurn', seat: mySeat });
        break;
      }
      // ---- Five Crowns ----
      case 'fc-draw-stock': {
        fcSel = []; fcMelds = [];
        doAct({ type: 'draw', seat: mySeat, source: 'stock' });
        break;
      }
      case 'fc-draw-discard': {
        fcSel = []; fcMelds = [];
        doAct({ type: 'draw', seat: mySeat, source: 'discard' });
        break;
      }
      case 'fc-tap': {
        var fcId = el.getAttribute('data-card');
        var pos = fcSel.indexOf(fcId);
        if (pos >= 0) fcSel.splice(pos, 1); else fcSel.push(fcId);
        render();
        break;
      }
      case 'fc-form': {
        if (fcSel.length < 3) break;
        var G1 = eng();
        var cards = fcSel.map(fcCardById).filter(Boolean);
        if (!G1.isValidMeld(cards, STATE.wildRank)) break;
        fcMelds.push(fcSel.slice());
        fcSel = [];
        render();
        break;
      }
      case 'fc-unmeld': {
        var mi = parseInt(el.getAttribute('data-mi'), 10);
        if (mi >= 0 && mi < fcMelds.length) fcMelds.splice(mi, 1);
        render();
        break;
      }
      case 'fc-discard': {
        if (fcSel.length !== 1) break;
        var dId = fcSel[0];
        fcSel = []; fcMelds = [];
        doAct({ type: 'discard', seat: mySeat, cardId: dId });
        break;
      }
      case 'fc-go-out': {
        var leftover = fcAvailableCards();
        if (leftover.length !== 1) break;
        var melds = fcMelds.map(function (g) { return g.slice(); });
        var discardId = leftover[0].id;
        fcSel = []; fcMelds = [];
        doAct({ type: 'goOut', seat: mySeat, melds: melds, discardId: discardId });
        break;
      }
      case 'fc-laydown': {
        if (fcSel.length !== 1) break;
        var lMelds = fcMelds.map(function (g) { return g.slice(); });
        var lDiscard = fcSel[0];
        fcSel = []; fcMelds = [];
        doAct({ type: 'layDown', seat: mySeat, melds: lMelds, discardId: lDiscard });
        break;
      }
      case 'fc-next-round': {
        fcSel = []; fcMelds = [];
        if (MODE === 'localGame') dispatchLocal({ type: 'nextRound' });
        else submitOnline({ type: 'nextRound' });
        break;
      }
    }
  });
  // route a player's own action through the correct runner (local vs online)
  function doAct(action) {
    if (MODE === 'localGame') dispatchLocal(action); else submitOnline(action);
  }

  document.addEventListener('input', function (e) {
    if (e.target && (e.target.id === 'nameInput' || e.target.id === 'nameInput2')) {
      var v = e.target.value.trim(); if (v) { myName = v; rememberName(); }
    }
  });

  var savedIdentity = loadIdentity();
  initFromHashAndSaved(savedIdentity);
  render();
  autoRejoin();
})();

  
  </script>
</body>
</html>

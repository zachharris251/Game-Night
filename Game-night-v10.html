    if (db && roomCode) db.ref(roomPath() + '/players/' + myId).update({ team: myTeamPref || null, ts: Date.now() });
    render();
  }
  function stopPresence() { if (presenceTimer) { clearInterval(presenceTimer); presenceTimer = null; } }
  function detachListeners() {
    listeners.forEach(function (l) { try { l.ref.off(l.ev, l.cb); } catch (e) {} });
    listeners = [];
  }

  // Court-card and joker figures, drawn as inline SVG so they scale crisply and
  // need no image files. Colored to match the suit.
  function courtSVG(kind, red) {
    var ink = red ? '#b3202a' : '#1a1a1a';
    var skin = '#f0d3b0', gold = '#c8a24a', robe = red ? '#c8322c' : '#2f3d63';
    if (kind === 'J') {
      return '<svg viewBox="0 0 60 90" class="court-svg">' +
        '<rect x="18" y="8" width="24" height="16" rx="3" fill="' + gold + '"/>' +
        '<circle cx="30" cy="30" r="9" fill="' + skin + '"/>' +
        '<path d="M14 76 Q30 40 46 76 Z" fill="' + robe + '"/>' +
        '<path d="M22 24 l-6 10 M38 24 l6 10" stroke="' + gold + '" stroke-width="2" fill="none"/>' +
        '<circle cx="16" cy="35" r="3" fill="' + gold + '"/><circle cx="44" cy="35" r="3" fill="' + gold + '"/>' +
        '<text x="30" y="60" text-anchor="middle" font-size="13" fill="' + ink + '" font-family="Georgia,serif">J</text></svg>';
    }
    if (kind === 'Q') {
      return '<svg viewBox="0 0 60 90" class="court-svg">' +
        '<path d="M16 12 l6 8 4-8 4 8 4-8 4 8 6-8 -2 14 H18 Z" fill="' + gold + '"/>' +
        '<circle cx="30" cy="32" r="9" fill="' + skin + '"/>' +
        '<path d="M12 78 Q30 42 48 78 Z" fill="' + robe + '"/>' +
        '<circle cx="30" cy="52" r="4" fill="' + gold + '"/>' +
        '<text x="30" y="72" text-anchor="middle" font-size="12" fill="#fff" font-family="Georgia,serif">Q</text></svg>';
    }
    if (kind === 'K') {
      return '<svg viewBox="0 0 60 90" class="court-svg">' +
        '<path d="M16 14 h28 l-3 -8 -4 6 -3 -8 -3 8 -4 -6 Z" fill="' + gold + '"/>' +
        '<rect x="28" y="4" width="4" height="6" fill="' + gold + '"/>' +
        '<circle cx="30" cy="32" r="9" fill="' + skin + '"/>' +
        '<path d="M28 28 q2 4 4 0" stroke="' + ink + '" stroke-width="1.2" fill="none"/>' +
        '<path d="M12 78 Q30 40 48 78 Z" fill="' + robe + '"/>' +
        '<rect x="27" y="44" width="6" height="18" fill="' + gold + '"/><rect x="22" y="50" width="16" height="5" fill="' + gold + '"/>' +
        '<text x="30" y="74" text-anchor="middle" font-size="12" fill="#fff" font-family="Georgia,serif">K</text></svg>';
    }
    return '';
  }
  function jokerSVG(big) {
    var cap = big ? '#c8322c' : '#2f6d4f', bell = '#c8a24a';
    return '<svg viewBox="0 0 60 90" class="court-svg joker">' +
      '<path d="M14 30 Q10 10 22 14 Q30 4 38 14 Q50 10 46 30 Z" fill="' + cap + '"/>' +
      '<circle cx="14" cy="30" r="4" fill="' + bell + '"/><circle cx="46" cy="30" r="4" fill="' + bell + '"/><circle cx="30" cy="12" r="3" fill="' + bell + '"/>' +
      '<circle cx="30" cy="42" r="11" fill="#f0d3b0"/>' +
      '<circle cx="26" cy="40" r="1.6" fill="#1a1a1a"/><circle cx="34" cy="40" r="1.6" fill="#1a1a1a"/>' +
      '<path d="M25 46 q5 5 10 0" stroke="#b3202a" stroke-width="1.6" fill="none"/>' +
      '<path d="M18 78 Q30 54 42 78 Z" fill="' + cap + '"/>' +
      '<text x="30" y="72" text-anchor="middle" font-size="9" fill="#fff" font-family="Georgia,serif">' + (big ? 'BIG' : 'LIL') + '</text></svg>';
  }
  function cardFaceHTML(card, mini) {
    var cls = 'card-face pretty' + (mini ? ' mini' : '');
    if (card.joker) {
      var big = card.joker === 'big';
      return '<span class="' + cls + ' blooper ' + (big ? 'big' : 'little') + '">' +
        '<span class="corner tl"><span class="cr">&#9733;</span></span>' +
        '<span class="court-fig">' + jokerSVG(big) + '</span>' +
        '<span class="corner br"><span class="cr">&#9733;</span></span>' +
        '<span class="joker-word">' + (big ? 'BIG' : 'LITTLE') + ' JOKER</span></span>';
    }
    var red = (card.suit === 'H' || card.suit === 'D');
    var sym = E.SUIT_SYM[card.suit];
    var rk = E.rankLabel(card.rank);
    var courtKind = (card.rank === 11 ? 'J' : (card.rank === 12 ? 'Q' : (card.rank === 13 ? 'K' : null)));
    var center = courtKind
      ? '<span class="court-suit a">' + sym + '</span>' +
        '<span class="court-fig">' + courtSVG(courtKind, red) + '</span>' +
        '<span class="court-suit b">' + sym + '</span>'
      : '<span class="pip-big">' + sym + '</span>';
    return '<span class="' + cls + (red ? ' red' : ' black') + '">' +
      '<span class="corner tl"><span class="cr">' + rk + '</span><span class="cs">' + sym + '</span></span>' +
      center +
      '<span class="corner br"><span class="cr">' + rk + '</span><span class="cs">' + sym + '</span></span></span>';
  }

  // ----------------------------------------------------------- render dispatch
  function render() {
    syncChat();
    renderAbsentBanner();
    recordGameResultIfHost();
    maybeShowLeaderboard();
    updateTurnNag();
    if (MODE === 'home') return renderHome();
    if (MODE === 'gameSetup') return renderGameSetup();
    if (MODE === 'onlineLobby') return renderLobby();
    if (MODE === 'localGame' || MODE === 'onlineGame') return renderTable();
    renderHome();
  }

  // Host-only: replace a specific absent human's seat with a bot on demand, keeping
  // playerId + humanName so the human can reclaim it by id or name when they return.
  function botFillSeat(seat) {
    if (!isHost || !STATE || !STATE.seats) return;
    var N = (STATE.numSeats) || numSeats();
    var s = STATE.seats[seat];
    if (!s || s.isBot) return;
    var taken = {};
    for (var i = 0; i < N; i++) { var e = STATE.seats[i]; if (e && e.name) taken[e.name] = true; }
    var pool = pickBotNames(BOT_NAMES.length).filter(function (n) { return !taken[n]; });
    var botName = pool[0] || ('Bot ' + (seat + 1));
    STATE.seats[seat] = { name: botName, isBot: true, playerId: s.playerId, wasHuman: true, humanName: s.name };
    if (hostTimer) { clearTimeout(hostTimer); hostTimer = null; }
    writeRoom(); render(); scheduleHostFollowup();
  }
  // Floating host-only prompt for any seat whose human has dropped. Human seats are
  // never auto-converted; the host decides whether to fill a dropped seat with a bot
  // so play continues, or leave it held open for the player to return to.
  function renderAbsentBanner() {
    var el = document.getElementById('absentBanner');
    var show = (MODE === 'onlineGame') && isHost && STATE && STATE.seats;
    var absent = [];
    if (show) {
      var N = (STATE.numSeats) || numSeats();
      for (var i = 0; i < N; i++) {
        var s = STATE.seats[i];
        if (s && !s.isBot && s.playerId && s.absentSince) absent.push({ seat: i, name: s.name });
      }
    }
    if (!absent.length) { if (el) el.remove(); return; }
    if (!el) { el = document.createElement('div'); el.id = 'absentBanner'; document.body.appendChild(el); }
    el.className = 'absent-banner';
    el.innerHTML = absent.map(function (a) {
      return '<div class="absent-row"><span class="absent-txt">' + esc(a.name) +
        ' left. Seat held open.</span>' +
        '<button class="btn btn-sm absent-btn" data-act="fill-bot" data-seat="' + a.seat + '">Fill with bot</button></div>';
    }).join('');
  }
  // Start the chat listener when entering an online game; tear it down otherwise.
  function syncChat() {
    var inRoom = !!(roomCode && db) && (MODE === 'onlineGame' || MODE === 'onlineLobby');
    if (inRoom) {
      if (!chatRef) startChat();
      if (!fxRef) startFx();
      if (!teamNamesRef) startTeamNames();
      if (!audienceRef2) startAudienceWatch();
      renderChat();
    } else {
      if (chatRef || document.getElementById('chatPanel')) stopChat();
      stopFx(); stopTeamNames(); stopAudienceWatch();
    }
  }

  function renderHome() {
    var tiles = '';
    Object.keys(GAME_META).forEach(function (g) {
      var m = GAME_META[g];
      tiles += '<div class="tile" data-act="pick-game" data-game="' + g + '">' +
        '<div class="tile-title display">' + m.title + '</div>' +
        '<div class="tile-blurb">' + m.blurb + '</div></div>';
    });
    COMING.forEach(function (c) {
      tiles += '<div class="tile off"><div class="tile-title display">' + c.title + '</div>' +
        '<div class="tile-blurb">Coming in ' + c.note + '</div></div>';
    });
    app.innerHTML =
      '<div class="home-hero">' +
        '<h1>Game Night</h1>' +
        '<div class="stencil-rule"></div>' +
        '<div class="sub">Pick a game. Play against the bots right away, or host a room and send one link so everyone joins from their own phone. No accounts.</div>' +
      '</div>' +
      '<div class="tile-grid">' + tiles + '</div>';
  }

  function renderGameSetup() {
    var m = GAME_META[GAME];
    var online = window.firebase
      ? '<button class="btn" data-act="go-online">Play online</button>'
      : '<button class="btn" disabled>Play online</button>' +
        '<div class="note warn-note">The Firebase scripts could not load (offline or blocked), so online play is unavailable right now. Play vs bots still works.</div>';
    var opts = '';
    if (GAME !== 'bab' && GAME !== 'war') {
      var cap = seatCap();
      if (chosenSeats > cap) chosenSeats = cap;
      var scOpts = '';
      for (var sc = 2; sc <= cap; sc++) scOpts += '<option value="' + sc + '"' + (chosenSeats === sc ? ' selected' : '') + '>' + sc + ' players</option>';
      opts += '<div class="field"><label for="seatCountInput">Players (you plus bots, or humans online)</label>' +
        '<select id="seatCountInput" style="width:100%;background:#11150f;color:var(--bone);border:1px solid var(--line);border-radius:4px;padding:11px 12px;font-size:16px;font-family:var(--body)">' +
          scOpts +
        '</select>' + (GAME === 'skipbo' ? '<div class="note">Skip-Bo tops out at 6 players.</div>' : '') + '</div>';
    }
    if (m.strict) {
      opts += '<div class="field"><label for="strictModeInput">Card restrictions</label>' +
        '<select id="strictModeInput" style="width:100%;background:#11150f;color:var(--bone);border:1px solid var(--line);border-radius:4px;padding:11px 12px;font-size:16px;font-family:var(--body)">' +
          '<option value="true"' + (strictMode ? ' selected' : '') + '>Strict (only show legal cards)</option>' +
          '<option value="false"' + (!strictMode ? ' selected' : '') + '>Permissive (show all cards, penalize reneges)</option>' +
        '</select></div>';
    }
    app.innerHTML =
      '<div class="spread" style="margin-bottom:10px"><div class="eyebrow">' + m.title + '</div>' +
      '<button class="btn btn-ghost btn-sm" data-act="back-picker">All games</button></div>' +
      '<div class="home-hero" style="padding-top:4px"><h1 style="font-size:34px">' + m.title + '</h1>' +
        '<div class="stencil-rule"></div><div class="sub">' + m.blurb + '</div></div>' +
      '<div class="card-panel" style="max-width:420px;margin:14px auto 0;">' +
        '<div class="field"><label for="nameInput">Your name</label>' +
        '<input id="nameInput" type="text" maxlength="18" placeholder="' + esc(myName) + '" value="' + (myName === 'You' ? '' : esc(myName)) + '"></div>' +
        opts +
        '<div class="home-actions">' +
          '<button class="btn-accent btn" data-act="local-start">Play vs bots</button>' +
          online +
        '</div>' +
      '</div>';
  }

  // ----------------------------------------------------------- lobby (online)
  function currentSeats() {
    if (STATE && STATE.seats && (MODE === 'onlineGame' || MODE === 'localGame')) return STATE.seats;
    if (room && room.seats) return arrayToSeats(room.seats);
    return {};
  }
  function seatArray() {
    var seats = currentSeats(), arr = [], N = numSeats();
    for (var i = 0; i < N; i++) arr.push(seats[i] || null);
    return arr;
  }
  function computeMySeat() {
    var arr = seatArray(), i;
    for (i = 0; i < arr.length; i++) if (arr[i] && arr[i].playerId === myId) return i;
    // Fallback: bind by name so a reopened player (fresh id) still lands on their seat.
    var nm = String(myName || '').toLowerCase();
    if (nm && nm !== 'you') for (i = 0; i < arr.length; i++) {
      var s = arr[i]; if (!s) continue;
      var owner = s.isBot ? s.humanName : s.name;
      if (owner && String(owner).toLowerCase() === nm) return i;
    }
    return -1;
  }

  function renderLobby() {
    var seats = seatArray();
    var seated = computeMySeat();
    var N = numSeats();
    var rows = '';
    for (var i = 0; i < N; i++) {
      var s = seats[i];
      var teamLab = (GAME === 'bab') ? (' &middot; ' + esc(teamNameIdx(i % 2 === 0 ? 0 : 1))) : '';
      var youMark = (s && s.playerId === myId) ? ' you' : '';
      var occupant = s
        ? esc(s.name) + (s.isBot ? ' <span class="tag">bot</span>' : '') + (s.playerId === myId ? ' <span class="tag">you</span>' : '')
        : '<span class="muted">Open &middot; a bot fills in at start</span>';
      rows += '<div class="seat-card' + youMark + '"><div><div class="nm display">Seat ' + i + teamLab + '</div><div style="margin-top:4px">' + occupant + '</div></div></div>';
    }
    var startBtn = isHost
      ? '<button class="btn-accent btn" data-act="start-game">Start match</button>'
      : '<div class="muted display" style="align-self:center">' +
        (seated < 0 ? 'Finding you a seat...' : 'Waiting for the host to start.') + '</div>';
    var teamPick = '';
    if (GAME === 'bab') {
      var curTeam = myTeamPref || (seated >= 0 ? (seated % 2 === 0 ? 'A' : 'B') : null);
      var nmA = esc(teamNameIdx(0)), nmB = esc(teamNameIdx(1));
      var renameBtn = curTeam
        ? '<button class="btn btn-sm" data-act="team-rename">Rename ' + esc(teamNameIdx(curTeam === 'A' ? 0 : 1)) + '</button>'
        : '';
      teamPick =
        '<div class="team-pick"><div class="eyebrow">Your team</div>' +
        '<div class="row" style="margin-top:6px">' +
          '<button class="btn btn-sm team-btn' + (curTeam === 'A' ? ' on' : '') + '" data-act="team-a">' + nmA + '</button>' +
          '<button class="btn btn-sm team-btn' + (curTeam === 'B' ? ' on' : '') + '" data-act="team-b">' + nmB + '</button>' +
        '</div>' +
        '<div class="row" style="margin-top:6px">' + renameBtn + '</div>' +
        '<div class="muted" style="margin-top:5px;font-size:12px">' + nmA + ' takes seats 0 and 2, ' + nmB + ' takes seats 1 and 3. Your partner sits across from you. Anyone on a team can rename it.</div></div>';
    }
    var shareBtns =
      '<div class="row" style="margin-top:6px">' +
        (navigator.share ? '<button class="btn-accent btn btn-sm" data-act="share-room">Share invite</button>' : '') +
        '<button class="btn btn-sm" data-act="copy-invite">Copy invite link</button>' +
        '<button class="btn btn-sm" data-act="copy-code">Copy code</button>' +
      '</div>';
    app.innerHTML =
      '<div class="spread" style="margin-bottom:10px"><div class="eyebrow">Room</div>' +
      '<button class="btn btn-ghost btn-sm" data-act="home">Leave</button></div>' +
      '<div class="card-panel">' +
        '<div class="spread"><div><div class="eyebrow">Share this code</div>' +
        '<div class="code-chip">' + esc(roomCode || '----') + '</div>' + shareBtns + '</div>' +
        '<div class="muted" style="max-width:240px">Everyone opens your link, taps Play online, and enters this code. No account needed. Up to ' + N + ' seats; any open seats play as bots.</div></div>' +
        '<hr class="divider">' +
        teamPick +
        '<div class="seat-list">' + rows + '</div>' +
        '<div class="row" style="justify-content:flex-end">' + startBtn + '</div>' +
      '</div>';
  }

  // ----------------------------------------------------------- table
  function seatPanel(seat, sideClass) {
    // Use STATE.seats during games (has bot names); fall back to currentSeats for lobby
    var s = null;
    if (STATE && STATE.seats && (MODE === 'localGame' || MODE === 'onlineGame')) {
      s = STATE.seats[seat];
    } else {
      var seats = currentSeats();
      s = seats[seat];
    }
    
    // Guarantee a valid seat object with a name
    if (!s) {
      s = { name: 'Seat ' + seat, isBot: false };
    }
    // For bots without a name, use the canonical bot names
    if (!s.name) {
      s.name = BOT_NAMES[seat] || ('Seat ' + seat);
      if (!s.isBot && !s.name) s.name = 'Seat ' + seat;
    }
    // Override "Seat N" labels with bot names for seats 1, 2, 3 if they're bots
    if (s.isBot && s.name && s.name.startsWith('Seat ')) {
      s.name = BOT_NAMES[seat] || s.name;
    }
    
    var isYou = (seat === mySeat);
    var turn = (STATE && STATE.phase === 'bidding' || STATE && STATE.phase === 'playing') && STATE && STATE.turnSeat === seat;
    var dealer = STATE && STATE.dealerSeat === seat;
    var nameLine = '<div class="nm">' + (isYou ? 'You' : esc(s.name)) +
      (s.isBot ? ' <span class="chip bot">bot</span>' : '') +
      (dealer ? ' <span class="chip">deal</span>' : '') + '</div>';

    var bidLine;
    if (STATE.bids && STATE.bids[seat]) {
      var b = STATE.bids[seat];
      var cls = b.type === 'board' ? 'board' : (b.type === 'boston' ? 'boston' : '');
      var boardTxt = { 1: 'BOARD', 2: 'DBL BOARD', 3: 'TRPL BOARD', 4: 'QUAD BOARD' };
      var txt = b.type === 'pass' ? 'pass' : (b.type === 'board' ? (boardTxt[b.level || 1] || 'BOARD') : (b.type === 'boston' ? 'BOSTON' : b.value));
      bidLine = '<span class="bidv ' + cls + '">' + txt + '</span>';
    } else {
      bidLine = '<span class="muted">--</span>';
    }
    var tricks = STATE.tricksWon ? STATE.tricksWon[seat] : 0;
    var meta = '<div class="meta-line"><span>bid ' + bidLine + '</span><span class="trk">tricks ' + tricks + '</span></div>';
    return '<div class="seat ' + (sideClass || '') + (turn ? ' turn' : '') + '">' + nameLine + meta + '</div>';
  }

  function trickSlotFor(targetRel) {
    var trick = STATE.currentTrick || [];
    for (var i = 0; i < trick.length; i++) {
      if (rel(trick[i].seat) === targetRel) return cardFaceHTML(trick[i].card, true);
    }
    return '';
  }

  function renderTopbar() {
    var us = usTeam(), them = 1 - us;
    var usScore = STATE.scores[us], themScore = STATE.scores[them];
    var usLead = usScore > themScore ? ' lead' : '';
    var themLead = themScore > usScore ? ' lead' : '';
    var tally =
      '<div class="tally">' +
        '<div class="t-line t-us"><span class="t-name">' + (isAudience ? esc(teamNameIdx(us)) : 'Us &middot; ' + esc(teamNameIdx(us))) + '</span>' +
        '<span class="t-score' + usLead + '">' + usScore + '</span></div>' +
        '<div class="t-line"><span class="t-name">' + (isAudience ? esc(teamNameIdx(them)) : 'Them &middot; ' + esc(teamNameIdx(them))) + '</span>' +
        '<span class="t-score' + themLead + '">' + themScore + '</span></div>' +
      '</div>';

    var trump;
    var burned = (STATE.burnedJokers && STATE.burnedJokers.length)
      ? '<span class="lab" style="color:var(--vermilion)">' +
        (STATE.burnedJokers.length === 2 ? 'both jokers burned' :
          (STATE.burnedJokers[0].joker === 'big' ? 'big joker burned' : 'lil joker burned')) + '</span>'
      : '';
    if (!STATE.trumpSuit) {
      trump = '<div class="trump-ind notrump"><span class="lab">Trump</span><span class="val">No-trump</span>' + burned + '</div>';
    } else {
      var red = (STATE.trumpSuit === 'H' || STATE.trumpSuit === 'D');
      var fc = STATE.flippedCard ? cardFaceHTMLFlip(STATE.flippedCard) : '';
      trump = '<div class="trump-ind">' + fc + '<div><span class="lab">Trump</span><br>' +
        '<span class="val' + (red ? ' red' : '') + '">' + E.SUIT_SYM[STATE.trumpSuit] + ' ' + E.SUIT_NAME[STATE.trumpSuit] + '</span>' +
        (burned ? '<br>' + burned : '') + '</div></div>';
    }
    var deal = '<div class="dealmeta"><div class="deal-num">Deal ' + (STATE.dealIndex + 1) + ' of ' + E.SEQ.length + ' &middot; ' + STATE.handSize + ' cards</div>' + trump + '</div>';

    var status = '';
    if (STATE.phase === 'bidding') {
      status = STATE.turnSeat === mySeat
        ? '<span class="turn">Your bid</span>'
        : 'Bidding: <span class="turn">' + esc(seatNameFor(STATE.turnSeat)) + '</span>';
    } else if (STATE.phase === 'playing') {
      if (STATE.awaitingTrickClear) {
        status = '<span class="turn">Trick complete</span>';
      } else {
        status = STATE.turnSeat === mySeat
          ? '<span class="turn">Your lead</span>'
          : 'To play: <span class="turn">' + esc(seatNameFor(STATE.turnSeat)) + '</span>';
        if (STATE.trumpSuit && !STATE.trumpBroken) status += '<br><span class="broken-flag">trump not broken</span>';
      }
    }
    return '<div class="topbar">' + tally + deal + '<div class="status-line">' + status + '</div></div>';
  }
  function cardFaceHTMLFlip(card) {
    if (card.joker) return '<span class="flip-card">&#9733;</span>';
    var red = (card.suit === 'H' || card.suit === 'D');
    return '<span class="flip-card' + (red ? ' red' : '') + '">' + E.rankLabel(card.rank) + E.SUIT_SYM[card.suit] + '</span>';
  }
  function seatNameFor(seat) {
    if (seat === mySeat) return 'you';
    var seats = currentSeats();
    return seats[seat] ? seats[seat].name : 'Seat ' + seat;
  }

  // ----------------------------------------------------- shared mini-game UI
  function quitHeader(label) {
    return '<div class="spread" style="margin-bottom:10px"><div class="eyebrow">' + esc(label) + '</div>' +
      '<button class="btn btn-ghost btn-sm" data-act="home">Quit</button></div>';
  }
  function genericLog(state) {
    var lines = (state.log || []).slice(-14).map(function (m) { return '<li>' + esc(m) + '</li>'; }).join('');
    return '<div class="logbox"><div class="eyebrow">Table log</div><ul class="log" id="logList">' + lines + '</ul></div>';
  }
  // A compact name chip used by Old Maid / Go Fish / Blow It (no bid/trick meta).
  function personChip(seat, turnFlag, extraHtml) {
    var s = (STATE.seats && STATE.seats[seat]) || { name: 'Seat ' + seat, isBot: false };
    var isYou = seat === mySeat;
    return '<div class="seat mini' + (turnFlag ? ' turn' : '') + (isYou ? ' you' : '') + '">' +
      '<div class="nm">' + (isYou ? 'You' : esc(s.name)) + (s.isBot ? ' <span class="chip bot">bot</span>' : '') + '</div>' +
      (extraHtml || '') + '</div>';
  }
  // Every seat except mine, in turn order starting to my left. Drives a flexible
  // opponent row that adapts to any 2-8 player count.
  function otherSeats() {
    var N = numSeats(), out = [];
    for (var k = 1; k < N; k++) out.push((mySeat + k) % N);
    return out;
  }
  function oppRow(chipFn) {
    return '<div class="opp-row">' + otherSeats().map(chipFn).join('') + '</div>';
  }
  // A simple felt: opponents across the top (wrapping), a center note, me at the
  // bottom. Used by the non-BAB games so they scale from 2 to 8 seats.
  function simpleFelt(chipFn, centerHtml, extraClass) {
    return '<div class="felt simple' + (extraClass ? ' ' + extraClass : '') + '">' +
      oppRow(chipFn) +
      '<div class="center-note">' + (centerHtml || '') + '</div>' +
      '<div class="seat-row bottom">' + chipFn(mySeat) + '</div>' +
      '</div>';
  }
  function afterDispatchScroll() {
    var logEl = $('logList'); if (logEl) logEl.scrollTop = logEl.scrollHeight;
  }

  function renderTable() {
    if (!STATE) { renderHome(); return; }
    if (STATE.phase === 'lobby') { renderLobby(); return; }
    // Audience spectates BAB with the full felt (hands are hidden below). For the
    // other games hands are baked into each table renderer, so to avoid leaking a
    // player's cards the audience gets a lightweight heckle screen instead.
    if (isAudience && GAME !== 'bab') return renderSpectatorSimple();
    if (GAME === 'oldmaid') return renderOldMaidTable();
    if (GAME === 'gofish') return renderGoFishTable();
    if (GAME === 'blowit') return renderBlowItTable();
    if (GAME === 'uno') return renderUnoTable();
    if (GAME === 'skyjo') return renderSkyjoTable();
    if (GAME === 'skipbo') return renderSkipBoTable();
    if (GAME === 'fivecrowns') return renderFiveCrownsTable();
    if (GAME === 'war') return renderWarTable();
    return renderBabTable();
  }

  function renderSpectatorSimple() {
    var N = numSeats(), chips = '';
    for (var i = 0; i < N; i++) {
      chips += '<div class="seat-card"><div><div class="nm display">' + esc(seatNameFor(i)) +
        (STATE.turnSeat === i ? ' <span class="tag">turn</span>' : '') + '</div></div></div>';
    }
    var title = 'Room ' + esc(roomCode || '') + ' \u00b7 ' + ((GAME_META[GAME] && GAME_META[GAME].title) || GAME) + ' (audience)';
    app.innerHTML = quitHeader(title) +
      '<div class="card-panel"><div class="eyebrow">Spectating</div>' +
      '<div class="muted" style="margin-bottom:8px">You are in the audience. Hands are hidden. Talk trash in chat and blast the screen.</div>' +
      '<div class="seat-list">' + chips + '</div></div>' + genericLog(STATE);
  }

  function renderBabTable() {
    maybeShuffleAnim();
    var topSeat = (mySeat + 2) % 4;
    var rightSeat = (mySeat + 1) % 4;
    var leftSeat = (mySeat + 3) % 4;

    var leadHint = '';
    if ((STATE.currentTrick || []).length === 0 && STATE.phase === 'playing') {
      leadHint = '<div class="lead-hint">lead</div>';
    }

    var felt =
      '<div class="felt">' +
        '<div class="seat-row top">' + seatPanel(topSeat) + '</div>' +
        '<div class="mid">' +
          '<div class="seat-wrap left">' + seatPanel(leftSeat, 'side') + '</div>' +
          '<div class="trick">' +
            '<div class="slot t-top">' + trickSlotFor(2) + '</div>' +
            '<div class="slot t-left">' + trickSlotFor(3) + '</div>' +
            '<div class="slot t-mid">' + leadHint + '</div>' +
            '<div class="slot t-right">' + trickSlotFor(1) + '</div>' +
            '<div class="slot t-bottom">' + trickSlotFor(0) + '</div>' +
          '</div>' +
          '<div class="seat-wrap right">' + seatPanel(rightSeat, 'side') + '</div>' +
        '</div>' +
        '<div class="seat-row bottom">' + seatPanel(mySeat) + '</div>' +
      '</div>';

    var leave = '<div class="spread" style="margin-bottom:10px"><div class="eyebrow">' +
      (MODE === 'onlineGame' ? 'Room ' + esc(roomCode || '') : 'Local match') + '</div>' +
      '<button class="btn btn-ghost btn-sm" data-act="home">Quit</button></div>';

    app.innerHTML = leave + renderTopbar() + felt + renderHand() + renderControls() + renderLog() + renderOverlay() + wastedFlash() + setFlash() + boardFlash();
    var logEl = $('logList'); if (logEl) logEl.scrollTop = logEl.scrollHeight;
  }

  function renderHand() {
    if (isAudience) {
      return '<div class="handbar"><div class="eyebrow">Audience</div>' +
        '<div class="muted">You are watching. Heckle in chat, blast a banner, or yell WASTED IT.</div></div>';
    }
    var myHand = (STATE.hands && STATE.hands[mySeat]) ? STATE.hands[mySeat] : [];
    var myTurnPlay = STATE.phase === 'playing' && STATE.turnSeat === mySeat && !awaiting;
    var legalIds = {};
    if (myTurnPlay) {
      E.legalPlays(STATE, mySeat, STATE.strictMode).forEach(function (c) { legalIds[c.id] = true; });
    }
    var cards = myHand.map(function (c) {
      var playable = myTurnPlay && legalIds[c.id];
      var cls = 'card-btn' + (STATE.phase === 'playing' && STATE.turnSeat === mySeat ? (playable ? ' playable' : ' dimmed') : '');
      var attrs = playable ? ' data-act="play-card" data-card="' + c.id + '"' : '';
      return '<button class="' + cls + '"' + attrs + (playable ? '' : ' tabindex="-1"') + '>' + cardFaceHTML(c, false) + '</button>';
    }).join('');
    return '<div class="handbar"><div class="eyebrow">Your hand</div><div class="hand">' + (cards || '<span class="muted">empty</span>') + '</div></div>';
  }

  function renderControls() {
    if (isAudience) return '<div class="controls"><div class="prompt muted">Spectating. Cheer, jeer, and nag from the chat panel.</div></div>';
    if (awaiting && STATE.turnSeat === mySeat) {
      return '<div class="controls"><div class="prompt">Sent. <span class="accent">Waiting for the table...</span></div></div>';
    }
    if (STATE.phase === 'playing' && STATE.turnSeat === mySeat) {
      var tr = STATE.currentTrick || [];
      if (tr.length && tr[0].card.joker === 'big' && (tr[0].seat % 2) !== (mySeat % 2) &&
          (STATE.hands[mySeat] || []).some(function (c) { return E.isTrump(c, STATE.trumpSuit); })) {
        return '<div class="controls"><div class="prompt">Big Joker led. <span class="accent">Your highest trump is forced.</span></div></div>';
      }
      return '<div class="controls"><div class="prompt">Tap a highlighted card to play. <span class="accent">You must follow the led suit if you can.</span></div></div>';
    }
    if (!(STATE.phase === 'bidding' && STATE.turnSeat === mySeat)) return '';
    var hs = STATE.handSize;
    var btns = '<button class="btn" data-act="bid" data-bidtype="pass">Pass</button>';
    for (var n = 1; n <= hs; n++) {
      btns += '<button class="btn" data-act="bid" data-bidtype="num" data-bidval="' + n + '">' + n + '</button>';
    }
    // The board button escalates: if boards were already declared this round, the
    // next boarder can only take the next level up (Double, Triple, Quadruple).
    var priorBoards = 0;
    if (STATE.bids) for (var bs = 0; bs < 4; bs++) { var bb = STATE.bids[bs]; if (bb && bb.type === 'board') priorBoards++; }
    var nextLevel = Math.min(priorBoards + 1, 4);
    var boardNames = { 1: 'Board', 2: 'Double Board', 3: 'Triple Board', 4: 'Quadruple Board' };
    btns += '<button class="btn btn-accent" data-act="bid" data-bidtype="board">' + boardNames[nextLevel] + '</button>';
    if (hs >= 6) btns += '<button class="btn btn-danger" data-act="bid" data-bidtype="boston">Boston</button>';
    var boardHint = priorBoards > 0 ? boardNames[nextLevel] : 'Board';
    return '<div class="controls"><div class="prompt">Your bid <span class="accent">(0 to ' + hs + ' tricks, or ' + boardHint + ' / ' + (hs >= 6 ? 'Boston' : 'no Boston this hand') + ')</span></div><div class="bid-grid">' + btns + '</div></div>';
  }

  function renderLog() {
    var lines = (STATE.log || []).slice(-14).map(function (m) { return '<li>' + esc(m) + '</li>'; }).join('');
    return '<div class="logbox"><div class="eyebrow">Table log</div><ul class="log" id="logList">' + lines + '</ul></div>';
  }

  // ----------------------------------------------------------- overlays
  // A brief shuffle animation plays when a new hand is dealt (dealIndex advances).
  var lastDealSeen = -1;
  function flashShuffle() {
    var el = document.createElement('div');
    el.className = 'shuffle-overlay';
    el.innerHTML = '<div class="shuffle-stack"><div class="sc"></div><div class="sc"></div><div class="sc"></div><div class="sc"></div><div class="shuffle-label">Shuffling</div></div>';
    document.body.appendChild(el);
    setTimeout(function () { if (el && el.parentNode) el.parentNode.removeChild(el); }, 1500);
  }
  function maybeShuffleAnim() {
    if (GAME !== 'bab' || !STATE) return;
    var di = (typeof STATE.dealIndex === 'number') ? STATE.dealIndex : -1;
    if (lastDealSeen >= 0 && di > lastDealSeen && STATE.phase !== 'finished') flashShuffle();
    lastDealSeen = di;
  }
  // "WASTED IT!" flash: shown once, briefly, when someone throws the big joker
  // onto a trick they did not lead. The CSS animation fades it out on its own.
  var lastWastedTs = 0;
  // WASTED IT! shown once per event as a detached, body-level overlay so it
  // survives table re-renders and stays on screen for the full 5 seconds.
  function wastedFlash() {
    var w = STATE.wastedIt;
    if (!w) return '';
    if (w.ts === lastWastedTs) return ''; // already shown for this event
    lastWastedTs = w.ts;
    var who = (w.seat === mySeat && !isAudience) ? 'You' : esc(w.name);
    playWastedOverlay(who + ' threw the Big Joker away');
    return '';
  }
  // TEAM WENT SET! An obnoxious 10-second humiliation flash, once per scored
  // hand, for each team whose contract failed (negative delta). Body-level and
  // click-through so it plays over the result sheet without blocking Next hand.
  var lastSetDealShown = -1;
  var lastBoardDealShown = -1;
  function setFlash() {
    if (STATE.phase !== 'handScored' || !STATE.lastHandResult) return '';
    var di = (typeof STATE.dealIndex === 'number') ? STATE.dealIndex : -1;
    if (di === lastSetDealShown) return ''; // already shown for this hand
    var r = STATE.lastHandResult;
    var setTeams = [];
    if (r.teams[0] && r.teams[0].delta < 0) setTeams.push(teamNameIdx(0));
    if (r.teams[1] && r.teams[1].delta < 0) setTeams.push(teamNameIdx(1));
    if (!setTeams.length) { lastSetDealShown = di; return ''; }
    lastSetDealShown = di;
    var label = setTeams.length === 2 ? 'BOTH TEAMS WENT SET!' : (esc(setTeams[0]).toUpperCase() + ' WENT SET!');
    var faces = '';
    for (var i = 0; i < 14; i++) {
      var pick = (i % 2 === 0) ? '&#128514;' : '&#128517;'; // laughing / laughing-sweat
      faces += '<span class="set-face f' + (i % 7) + '">' + pick + '</span>';
    }
    var points = '';
    for (var j = 0; j < 8; j++) points += '<span class="set-point p' + (j % 4) + '">&#128072;</span>'; // pointing hand
    var el = document.createElement('div');
    el.className = 'set-flash';
    el.innerHTML = '<div class="set-faces">' + faces + '</div>' +
      '<div class="set-points">' + points + '</div>' +
      '<div class="set-word">' + label + '</div>' +
      '<div class="set-sub">HA HA HA HA HA</div>';
    document.body.appendChild(el);
    setTimeout(function () { if (el && el.parentNode) el.parentNode.removeChild(el); }, 5000);
    return '';
  }
  // Celebratory flash when a team actually makes a board or boston. Fireworks and
  // confetti for 5 seconds, shown once per scored deal.
  function boardFlash() {
    if (STATE.phase !== 'handScored' || !STATE.lastHandResult) return '';
    var di = (typeof STATE.dealIndex === 'number') ? STATE.dealIndex : -1;
    if (di === lastBoardDealShown) return '';
    var r = STATE.lastHandResult, hit = null;
    [0, 1].forEach(function (t) {
      var tr = r.teams[t];
      if (tr && tr.delta > 0 && (tr.type === 'board' || tr.type === 'boston')) {
        hit = { team: t === 0 ? 'A' : 'B', kind: tr.type === 'boston' ? 'BOSTON' : 'BOARD' };
      }
    });
    lastBoardDealShown = di;
    if (!hit) return '';
    var el = document.createElement('div');
    el.className = 'board-flash';
    var fireworks = '';
    for (var i = 0; i < 6; i++) fireworks += '<span class="fw fw' + i + '"></span>';
    var confetti = '';
    var cc = ['#e8b64c', '#c8322c', '#2f6d4f', '#3a6ea5', '#e8e2d0', '#d98a2b'];
    for (var j = 0; j < 60; j++) {
      confetti += '<span class="cf" style="left:' + Math.floor(Math.random() * 100) + '%;' +
        'background:' + cc[j % cc.length] + ';' +
        'animation-delay:' + (Math.random() * 1.2).toFixed(2) + 's;' +
        'animation-duration:' + (2.2 + Math.random() * 1.8).toFixed(2) + 's;' +
        'transform:rotate(' + Math.floor(Math.random() * 360) + 'deg);"></span>';
    }
    el.innerHTML = '<div class="board-fireworks">' + fireworks + '</div>' +
      '<div class="board-confetti">' + confetti + '</div>' +
      '<div class="board-burst">' +
      '<div class="board-word">TEAM ' + hit.team + '</div>' +
      '<div class="board-word big">PULLED OFF A ' + hit.kind + '!!!</div>' +
      '</div>';
    document.body.appendChild(el);
    setTimeout(function () { if (el && el.parentNode) el.parentNode.removeChild(el); }, 5000);
    return '';
  }
  function renderOverlay() {
    if (STATE.phase === 'handScored' && STATE.lastHandResult) return handResultOverlay();
    if (STATE.phase === 'finished') return gameOverOverlay();
    return '';
  }
  function deltaSpan(d) {
    return '<span class="delta ' + (d >= 0 ? 'pos' : 'neg') + '">' + (d >= 0 ? '+' : '') + d + '</span>';
  }
  function handResultOverlay() {
    var r = STATE.lastHandResult, us = usTeam(), them = 1 - us;
    function rowFor(t, label, isUs) {
      var tr = r.teams[t];
      return '<div class="result-row"><div class="who' + (isUs ? ' us' : '') + '">' + label +
        '<span class="detail">' + esc(tr.line) + '</span></div>' + deltaSpan(tr.delta) + '</div>';
    }
    var canAdvance = (MODE === 'localGame') || isHost;
    var advance = canAdvance
      ? '<button class="btn-accent btn" data-act="next-hand">Next hand</button>'
      : '<span class="waiting">Waiting for the host to deal the next hand.</span>';
    return '<div class="overlay"><div class="sheet">' +
      '<div class="eyebrow">Hand ' + (STATE.dealIndex + 1) + ' scored</div>' +
      '<h2>The reckoning</h2>' +
      rowFor(us, 'Us &middot; ' + esc(teamNameIdx(us)), true) + rowFor(them, 'Them &middot; ' + esc(teamNameIdx(them)), false) +
      '<div class="totals"><span>Running total</span><span>' + esc(teamNameIdx(us)) + ' ' + STATE.scores[us] + ' &middot; ' + esc(teamNameIdx(them)) + ' ' + STATE.scores[them] + '</span></div>' +
      '<div class="actions">' + advance + '</div>' +
      '</div></div>';
  }
  function gameOverOverlay() {
    var us = usTeam(), them = 1 - us;
    var u = STATE.scores[us], t = STATE.scores[them];
    var nmUs = esc(teamNameIdx(us)), nmThem = esc(teamNameIdx(them));
    var head = u > t ? '<span class="gg-win">' + nmUs + ' win</span>' : (t > u ? '<span class="gg-lose">' + nmThem + ' win</span>' : 'Dead heat');
    var again = (MODE === 'localGame')
      ? '<button class="btn-accent btn" data-act="play-again">Next match</button>'
      : '<button class="btn-accent btn" data-act="home">Back to start</button>';
    return '<div class="overlay"><div class="sheet">' +
      '<div class="eyebrow">25 deals complete</div>' +
      '<h2>' + head + '</h2>' +
      '<div class="result-row"><div class="who us">' + nmUs + (isAudience ? '' : ' (us)') + '</div><span class="delta">' + u + '</span></div>' +
      '<div class="result-row"><div class="who">' + nmThem + (isAudience ? '' : ' (them)') + '</div><span class="delta">' + t + '</span></div>' +
      '<div class="actions"><button class="btn btn-ghost" data-act="home">Home</button>' + again + '</div>' +
      '</div></div>';
  }

  // =========================================================== OLD MAID ===
  function renderOldMaidTable() {
    function countTag(seat) {
      var n = (STATE.hands[seat] || []).length;
      var p = STATE.pairs ? STATE.pairs[seat] : 0;
      return '<div class="meta-line"><span>' + n + ' card' + (n === 1 ? '' : 's') + '</span><span class="trk">' + p + ' pair' + (p === 1 ? '' : 's') + '</span></div>';
    }
    function chip(seat) { return personChip(seat, STATE.turnSeat === seat, countTag(seat)); }

    var myTurn = STATE.phase === 'playing' && STATE.turnSeat === mySeat;
    var drawSrc = STATE.drawFrom;
    var drawSrcHand = (myTurn && drawSrc != null) ? (STATE.hands[drawSrc] || []) : [];
    var fan = drawSrcHand.map(function (c, i) {
      return '<button class="card-btn" data-act="om-draw" data-index="' + i + '"><span class="card-face mini back"></span></button>';
    }).join('');

    var centerHtml = (myTurn ? '<div class="prompt">Draw one card from ' + esc(seatNameFor(drawSrc)) + '.</div><div class="hand" style="margin-top:8px">' + (fan || '<span class="muted">nothing to draw</span>') + '</div>'
      : (STATE.phase === 'playing' ? '<div class="muted">' + esc(seatNameFor(STATE.turnSeat)) + ' is drawing from ' + esc(seatNameFor(STATE.drawFrom)) + '&hellip;</div>' : ''));
    var felt = simpleFelt(chip, centerHtml);

    var myHand = (STATE.hands[mySeat] || []).map(function (c) { return '<span class="card-btn static">' + cardFaceHTML(c, false) + '</span>'; }).join('');
    var handbar = '<div class="handbar"><div class="eyebrow">Your hand</div><div class="hand">' + (myHand || '<span class="muted">out &mdash; you are safe</span>') + '</div></div>';

    var overlay = '';
    if (STATE.phase === 'finished') {
      var again = (MODE === 'localGame') ? '<button class="btn-accent btn" data-act="play-again">Next match</button>' : '<button class="btn-accent btn" data-act="home">Back to start</button>';
      var rows = '';
      for (var s = 0; s < numSeats(); s++) {
        rows += '<div class="result-row"><div class="who' + (s === mySeat ? ' us' : '') + '">' + esc(seatNameFor(s)) + '</div><span class="delta">' + STATE.pairs[s] + ' pairs</span></div>';
      }
      overlay = '<div class="overlay"><div class="sheet"><div class="eyebrow">Game over</div>' +
        '<h2>' + (STATE.loser === mySeat ? '<span class="gg-lose">You are the Old Maid!</span>' : esc(seatNameFor(STATE.loser)) + ' is stuck with the Old Maid') + '</h2>' +
        rows + '<div class="actions"><button class="btn btn-ghost" data-act="home">Home</button>' + again + '</div></div></div>';
    }

    app.innerHTML = quitHeader(MODE === 'onlineGame' ? 'Room ' + esc(roomCode || '') + ' &middot; Old Maid' : 'Old Maid') +
      felt + handbar + genericLog(STATE) + overlay;
    afterDispatchScroll();
  }

  // ============================================================ GO FISH ===
  function renderGoFishTable() {
    function meta(seat) {
      var n = (STATE.hands[seat] || []).length, b = STATE.books[seat].length;
      return '<div class="meta-line"><span>' + n + ' card' + (n === 1 ? '' : 's') + '</span><span class="trk">' + b + ' book' + (b === 1 ? '' : 's') + '</span></div>';
    }
    function chip(seat) { return personChip(seat, STATE.turnSeat === seat, meta(seat)); }

    var myTurn = STATE.phase === 'playing' && STATE.turnSeat === mySeat && !awaiting;
    var myHandArr = STATE.hands[mySeat] || [];
    // guard against stale selections after a book sweeps a rank away, or the turn moves on
    if (gfRank != null && (!myTurn || !myHandArr.some(function (c) { return c.rank === gfRank; }))) gfRank = null;

    var targets = [];
    for (var t = 0; t < numSeats(); t++) if (t !== mySeat && (STATE.hands[t] || []).length) targets.push(t);

    var forced = myTurn && (!myHandArr.length || !targets.length);

    var prompt;
    if (!myTurn) {
      prompt = (STATE.phase === 'playing') ? '<div class="muted">Waiting on ' + esc(seatNameFor(STATE.turnSeat)) + '&hellip;</div>' : '';
    } else if (forced) {
      prompt = '<div class="muted">' + (!myHandArr.length ? 'Your hand is empty.' : 'Nobody else is holding cards.') + ' Drawing from the stock&hellip;</div>';
    } else if (gfRank == null) {
      prompt = '<div class="prompt">Tap a card in your hand to ask for that rank.</div>';
    } else {
      var tgBtns = targets.map(function (s) {
        return '<button class="btn" data-act="gf-ask-target" data-target="' + s + '" data-rank="' + gfRank + '">' + esc(seatNameFor(s)) + '</button>';
      }).join('');
      prompt = '<div class="prompt">Ask who for ' + esc(E.rankLabel(gfRank)) + 's? <button class="btn btn-ghost btn-sm" data-act="gf-cancel-rank">Cancel</button></div><div class="bid-grid">' + tgBtns + '</div>';
    }

    var felt = simpleFelt(chip, '<div class="eyebrow">Stock: ' + STATE.stock.length + '</div>');

    var cards = myHandArr.map(function (c) {
      var pickable = myTurn && !forced && gfRank == null;
      var picked = gfRank != null && c.rank === gfRank;
      var cls = 'card-btn' + (pickable ? ' playable' : '') + (picked ? ' picked' : (myTurn && !forced ? ' dimmed' : ''));
      var attrs = pickable ? ' data-act="gf-pick-rank" data-rank="' + c.rank + '"' : '';
      return '<button class="' + cls + '"' + attrs + (pickable ? '' : ' tabindex="-1"') + '>' + cardFaceHTML(c, false) + '</button>';
    }).join('');
    var handbar = '<div class="handbar"><div class="eyebrow">Your hand</div><div class="hand">' + (cards || '<span class="muted">empty</span>') + '</div></div>';

    var overlay = '';
    if (STATE.phase === 'finished') {
      var again = (MODE === 'localGame') ? '<button class="btn-accent btn" data-act="play-again">Next match</button>' : '<button class="btn-accent btn" data-act="home">Back to start</button>';
      var rows = '';
      for (var s2 = 0; s2 < numSeats(); s2++) {
        rows += '<div class="result-row"><div class="who' + (s2 === mySeat ? ' us' : '') + '">' + esc(seatNameFor(s2)) + '</div><span class="delta">' + STATE.books[s2].length + ' books</span></div>';
      }
      var winTxt = (STATE.winners && STATE.winners.indexOf(mySeat) >= 0)
        ? '<span class="gg-win">You win!</span>'
        : (STATE.winners && STATE.winners.length ? esc(STATE.winners.map(seatNameFor).join(' & ')) + ' wins' : 'Game over');
      overlay = '<div class="overlay"><div class="sheet"><div class="eyebrow">Game over</div><h2>' + winTxt + '</h2>' +
        rows + '<div class="actions"><button class="btn btn-ghost" data-act="home">Home</button>' + again + '</div></div></div>';
    }

    app.innerHTML = quitHeader(MODE === 'onlineGame' ? 'Room ' + esc(roomCode || '') + ' &middot; Go Fish' : 'Go Fish') +
      felt + '<div class="controls">' + prompt + '</div>' + handbar + genericLog(STATE) + overlay;
    afterDispatchScroll();
  }

  // ============================================================ BLOW IT ===
  var DIE_FACE = ['', '\u2680', '\u2681', '\u2682', '\u2683', '\u2684', '\u2685'];
  function renderBlowItTable() {
    function meta(seat) {
      var sc = STATE.scores[seat];
      return '<div class="meta-line"><span>' + sc + ' pts</span>' + (STATE.onBoard[seat] ? '' : '<span class="trk">not on board</span>') + '</div>';
    }
    function chip(seat) { return personChip(seat, STATE.turnSeat === seat, meta(seat)); }

    var myTurn = STATE.phase === 'playing' && STATE.turnSeat === mySeat && !awaiting;
    if (!myTurn || STATE.rolled === null) biSel = [];

    var dice = '';
    if (STATE.rolled) {
      dice = STATE.rolled.map(function (v, i) {
        var sel = biSel.indexOf(i) >= 0;

        var cls = 'die' + (sel ? ' sel' : '') + (clickable ? ' clickable' : '');
        var attrs = clickable ? ' data-act="bi-toggle-die" data-index="' + i + '"' : '';

      }).join('');
    }

    var selVals = biSel.map(function (i) { return STATE.rolled[i]; });
    var selScore = (STATE.rolled && selVals.length) ? window.GAMES.blowit.scoreSelection(selVals) : 0;
    var projected = STATE.turnTotal + selScore;
    var canBank = selScore > 0 && (STATE.onBoard[mySeat] || projected >= 500);
    var canRollOn = selScore > 0;

    var prompt;
    if (!myTurn) {
      prompt = (STATE.phase === 'playing') ? '<div class="muted">Waiting on ' + esc(seatNameFor(STATE.turnSeat)) + '&hellip;</div>' : '';

      prompt = '<div class="prompt accent">Blew it! ' + STATE.turnTotal + ' points lost.</div><button class="btn btn-accent" data-act="bi-end-turn">Continue</button>';
    } else if (STATE.rolled === null) {
      prompt = '<div class="prompt">Turn total ' + STATE.turnTotal + ' &middot; ' + STATE.diceLeft + ' dice.</div><button class="btn btn-accent" data-act="bi-roll">Roll</button>';
    } else {
      prompt = '<div class="prompt">Tap scoring dice to keep them' + (selScore ? ' (worth ' + selScore + ')' : '') + '.</div>' +

          '<button class="btn' + (canRollOn ? ' btn-accent' : '') + '"' + (canRollOn ? '' : ' disabled') + ' data-act="bi-keep-roll">Keep &amp; roll again</button>' +
          '<button class="btn' + (canBank ? ' btn-accent' : '') + '"' + (canBank ? '' : ' disabled') + ' data-act="bi-keep-bank">Keep &amp; bank ' + (projected || '') + '</button>' +
        '</div>' +
        (!STATE.onBoard[mySeat] && projected > 0 && projected < 500 ? '<div class="note warn-note">Need 500+ to open your score.</div>' : '');

    var felt = simpleFelt(chip, '<div class="dice-row">' + (dice || '<span class="muted">no roll yet</span>') + '</div>');

    var overlay = '';
    if (STATE.phase === 'finished') {
      var again = (MODE === 'localGame') ? '<button class="btn-accent btn" data-act="play-again">Next match</button>' : '<button class="btn-accent btn" data-act="home">Back to start</button>';
      var rows = '';
      for (var s = 0; s < numSeats(); s++) {
        rows += '<div class="result-row"><div class="who' + (s === mySeat ? ' us' : '') + '">' + esc(seatNameFor(s)) + '</div><span class="delta">' + STATE.scores[s] + '</span></div>';
      }
      overlay = '<div class="overlay"><div class="sheet"><div class="eyebrow">Game over</div>' +
        '<h2>' + (STATE.winner === mySeat ? '<span class="gg-win">You win!</span>' : esc(seatNameFor(STATE.winner)) + ' wins') + '</h2>' +
        rows + '<div class="actions"><button class="btn btn-ghost" data-act="home">Home</button>' + again + '</div></div></div>';
    }

    app.innerHTML = quitHeader(MODE === 'onlineGame' ? 'Room ' + esc(roomCode || '') + ' &middot; Blow It' : 'Blow It') +
      felt + '<div class="controls">' + prompt + '</div>' + genericLog(STATE) + overlay;
    afterDispatchScroll();
  }

  // ================================================================ UNO ===
  function unoCardFace(card, opts) {
    opts = opts || {};
    var color = card.color ? card.color : 'W'; // W = wild (colorless)
    var label;
    if (card.kind === 'num') label = String(card.value);
    else if (card.kind === 'skip') label = '&#8856;';       // circled slash
    else if (card.kind === 'reverse') label = '&#8646;';    // reverse arrows
    else if (card.kind === 'draw2') label = '+2';
    else if (card.kind === 'wild') label = 'W';
    else if (card.kind === 'wild4') label = '+4';
    else label = '?';
    var cls = 'uno-card u-' + color + (opts.mini ? ' mini' : '') + (opts.playable ? ' playable' : '') + (opts.dimmed ? ' dimmed' : '');
    return '<span class="' + cls + '"><span class="uc-label">' + label + '</span></span>';
  }
  function unoColorSwatch(color) {
    return '<span class="uno-swatch u-' + color + '"></span>';
  }
  function renderUnoTable() {
    var G = window.GAMES.uno;
    function meta(seat) {
      var n = (STATE.hands[seat] || []).length;
      return '<div class="meta-line"><span>' + n + ' card' + (n === 1 ? '' : 's') + '</span></div>';
    }
    function chip(seat) { return personChip(seat, STATE.turnSeat === seat, meta(seat)); }

    var myTurn = STATE.phase === 'playing' && STATE.turnSeat === mySeat && !awaiting;
    var myHandArr = STATE.hands[mySeat] || [];
    // clear a stale wild-color pick if it is no longer our turn or the card is gone
    if (unoWildPick) {
      var stillHave = myHandArr.some(function (c) { return c.id === unoWildPick.cardId; });
      var drawnMatch = STATE.awaitingPlayOrPass && STATE.drawnCardId === unoWildPick.cardId;
      if (!myTurn || (!stillHave && !drawnMatch)) unoWildPick = null;
    }

    var awaitingDrawn = myTurn && STATE.awaitingPlayOrPass;
    var drawnCard = awaitingDrawn ? myHandArr.filter(function (c) { return c.id === STATE.drawnCardId; })[0] : null;

    // center: discard top + current color
    var dirArrow = STATE.direction === 1 ? '&#8635;' : '&#8634;';
    var center =
      '<div class="uno-center">' +
        unoCardFace(STATE.topCard, {}) +
        '<div class="uno-colnote">' + unoColorSwatch(STATE.currentColor) + '<span class="muted">' + G.COLOR_NAME[STATE.currentColor] + '</span> <span class="uno-dir">' + dirArrow + '</span></div>' +
      '</div>';

    var felt = simpleFelt(chip, center + '<div class="eyebrow" style="margin-top:6px">Draw: ' + STATE.drawPile.length + '</div>');

    // color-picker prompt (shared by play and playDrawn)
    var colorPicker = '';
    if (unoWildPick) {
      var swatches = G.COLORS.map(function (col) {
        return '<button class="btn uno-pick u-' + col + '" data-act="uno-pick-color" data-color="' + col + '">' + G.COLOR_NAME[col] + '</button>';
      }).join('');
      colorPicker = '<div class="prompt">Choose a color:</div><div class="bid-grid">' + swatches +
        '<button class="btn btn-ghost btn-sm" data-act="uno-cancel-wild">Cancel</button></div>';
    }

    var prompt;
    if (!myTurn) {
      prompt = (STATE.phase === 'playing') ? '<div class="muted">Waiting on ' + esc(seatNameFor(STATE.turnSeat)) + '&hellip;</div>' : '';
    } else if (colorPicker) {
      prompt = colorPicker;
    } else if (awaitingDrawn) {
      // drew a playable card: play it or pass
      var playBtn = '<button class="btn btn-accent" data-act="uno-play-drawn">Play ' + esc(G.cardLabel(drawnCard)) + '</button>';
      prompt = '<div class="prompt">You drew ' + esc(G.cardLabel(drawnCard)) + '.</div>' +
        '<div class="row" style="margin-top:8px">' + playBtn +
        '<button class="btn" data-act="uno-pass">Keep and pass</button></div>';
    } else {
      var legalIds = {};
      G.legalPlays(STATE, mySeat).forEach(function (c) { legalIds[c.id] = true; });
      var anyLegal = Object.keys(legalIds).length > 0;
      prompt = '<div class="prompt">' + (anyLegal ? 'Tap a card to play it.' : 'No legal card. Draw one.') + '</div>' +
        '<button class="btn' + (anyLegal ? '' : ' btn-accent') + '" data-act="uno-draw">Draw a card</button>';
    }

    // hand
    var legalNow = {};
    if (myTurn && !awaitingDrawn && !colorPicker) G.legalPlays(STATE, mySeat).forEach(function (c) { legalNow[c.id] = true; });
    var cards = myHandArr.map(function (c) {
      var playable = !!legalNow[c.id];
      var attrs = playable ? ' data-act="uno-play" data-card="' + c.id + '"' : '';
      return '<button class="uno-card-btn"' + attrs + (playable ? '' : ' tabindex="-1"') + '>' +
        unoCardFace(c, { playable: playable, dimmed: myTurn && !playable && !awaitingDrawn }) + '</button>';
    }).join('');
    var handbar = '<div class="handbar"><div class="eyebrow">Your hand (' + myHandArr.length + ')</div><div class="hand uno-hand">' + (cards || '<span class="muted">empty</span>') + '</div></div>';

    var overlay = '';
    if (STATE.phase === 'finished') {
      var again = (MODE === 'localGame') ? '<button class="btn-accent btn" data-act="play-again">Next match</button>' : '<button class="btn-accent btn" data-act="home">Back to start</button>';
      var rows = '';
      for (var s = 0; s < numSeats(); s++) {
        rows += '<div class="result-row"><div class="who' + (s === mySeat ? ' us' : '') + '">' + esc(seatNameFor(s)) + '</div><span class="delta">' + STATE.hands[s].length + ' left</span></div>';
      }
      overlay = '<div class="overlay"><div class="sheet"><div class="eyebrow">Game over</div>' +
        '<h2>' + (STATE.winner === mySeat ? '<span class="gg-win">You win!</span>' : esc(seatNameFor(STATE.winner)) + ' wins') + '</h2>' +
        rows + '<div class="actions"><button class="btn btn-ghost" data-act="home">Home</button>' + again + '</div></div></div>';
    }

    app.innerHTML = quitHeader(MODE === 'onlineGame' ? 'Room ' + esc(roomCode || '') + ' &middot; UNO' : 'UNO') +
      felt + '<div class="controls">' + prompt + '</div>' + handbar + genericLog(STATE) + overlay;
    afterDispatchScroll();
  }

  // ============================================================== SKYJO ===
  function skyjoSlot(slot, opts) {
    opts = opts || {};
    if (!slot) return '<span class="sky-slot cleared"></span>';
    if (!slot.faceUp) {
      var attrsD = opts.tapAct ? ' data-act="' + opts.tapAct + '" data-slot="' + opts.slotIndex + '"' : '';
      return '<button class="sky-slot down' + (opts.tappable ? ' tappable' : '') + '"' + attrsD + (opts.tappable ? '' : ' tabindex="-1"') + '>?</button>';
    }
    var v = slot.value;
    var band = v < 0 ? 'neg' : (v === 0 ? 'zero' : (v <= 4 ? 'low' : (v <= 8 ? 'mid' : 'high')));
    var attrsU = opts.tapAct ? ' data-act="' + opts.tapAct + '" data-slot="' + opts.slotIndex + '"' : '';
    return '<button class="sky-slot up band-' + band + (opts.tappable ? ' tappable' : '') + '"' + attrsU + (opts.tappable ? '' : ' tabindex="-1"') + '>' + v + '</button>';
  }
  function skyjoGrid(seat, opts) {
    opts = opts || {};
    var isMine = opts.isMine;        // always style the player's own grid large
    var interactive = opts.interactive; // only tappable when it is their action
    var grid = STATE.grids[seat];
    var cells = '';
    for (var i = 0; i < grid.length; i++) {
      var tappable = false, tapAct = null;
      if (interactive && STATE.drawnCard && grid[i]) {
        // holding a card: any slot can be placed onto; a stock-drawn card can also be discarded by flipping a face-down slot
        tappable = true; tapAct = 'sky-slot-tap';
      }
      cells += skyjoSlot(grid[i], { tappable: tappable, tapAct: tapAct, slotIndex: i });
    }
    return '<div class="sky-grid' + (isMine ? ' mine' : '') + '">' + cells + '</div>';
  }
  // Live in-round tally: the sum of a seat's currently face-up cards, i.e. the
  // provisional round score before any face-down cards are revealed at round end.
  function skyLiveRound(seat) {
    var g = STATE.grids && STATE.grids[seat];
    if (!g) return 0;
    var sum = 0;
    for (var i = 0; i < g.length; i++) { var sl = g[i]; if (sl && sl.faceUp) sum += sl.value; }
    return sum;
  }
  function renderSkyjoTable() {
    function scoreMeta(seat) {
      // During play show the running round tally next to the carried total. Once

          '<span>' + STATE.scores[seat] + ' total</span></div>';
      }
      return '<div class="meta-line"><span>' + STATE.scores[seat] + ' pts</span></div>';
    }
    function miniGridChip(seat) {
      return '<div class="sky-seat">' + personChip(seat, STATE.turnSeat === seat, scoreMeta(seat)) +
        '<div class="sky-mini">' + skyjoGrid(seat, { isMine: false, interactive: false }) + '</div></div>';
    }

    var myTurn = STATE.phase === 'playing' && STATE.turnSeat === mySeat && !awaiting;
    var holding = myTurn && !!STATE.drawnCard;

    var top =
      '<div class="sky-others opp-row">' + otherSeats().map(miniGridChip).join('') + '</div>';

    var discardTop = STATE.topDiscard;
    var center =
      '<div class="sky-center">' +
        '<div class="sky-pile"><div class="eyebrow">Draw</div><div class="sky-pileface down">' + STATE.drawPile.length + '</div></div>' +
        '<div class="sky-pile"><div class="eyebrow">Discard</div>' +
          (discardTop ? '<div class="sky-pileface">' + discardTop.value + '</div>' : '<div class="sky-pileface empty">-</div>') + '</div>' +
        (holding ? '<div class="sky-pile"><div class="eyebrow">Holding</div><div class="sky-pileface hold">' + STATE.drawnCard.value + '</div></div>' : '') +
      '</div>';

    var prompt;
    if (STATE.phase === 'roundEnd') {
      var rrows = '';
      for (var s2 = 0; s2 < numSeats(); s2++) {
        rrows += '<div class="result-row"><div class="who' + (s2 === mySeat ? ' us' : '') + '">' + esc(seatNameFor(s2)) +
          '</div><span class="delta">+' + STATE.roundScores[s2] + ' (' + STATE.scores[s2] + ')</span></div>';
      }
      var nextBtn = (STATE.winner == null) ? '<button class="btn btn-accent" data-act="sky-next-round">Next round</button>' : '';
      prompt = '<div class="prompt">Round over.</div>' + rrows + '<div class="row" style="margin-top:8px">' + nextBtn + '</div>';
    } else if (!myTurn) {
      prompt = '<div class="muted">Waiting on ' + esc(seatNameFor(STATE.turnSeat)) + '&hellip;</div>';
    } else if (!holding) {

        '<div class="row" style="margin-top:8px">' +
